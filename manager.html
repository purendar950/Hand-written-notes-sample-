<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Manager - Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;flex-direction:column}
:root{--bg:#0d1117;--surface:#161b22;--card:#21262d;--accent:#ffd54f;--blue:#58a6ff;--text:#e6edf3;--muted:#8b949e;--border:#30363d;--danger:#f85149;--success:#3fb950;--radius:12px}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
.top-bar-left{display:flex;flex-direction:column;gap:4px}
.site-title{font-size:16px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px}
.breadcrumb{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}
.bc-link{cursor:pointer;color:var(--blue);transition:color .2s}
.bc-link:hover{color:#79c0ff}
.bc-sep{color:#484f58}
.bc-current{color:var(--text)}
.top-bar-right{display:flex;align-items:center;gap:12px}
.publish-status{font-size:12px;padding:4px 10px;border-radius:16px;background:var(--card);border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.publish-status.ok{color:var(--success);border-color:var(--success)}
.publish-status.err{color:var(--danger);border-color:var(--danger)}
.icon-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s;color:var(--text)}
.icon-btn:hover{border-color:var(--blue);background:var(--surface)}
.main-content{flex:1;padding:24px;max-width:1200px;margin:0 auto;width:100%}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.section-header h2{font-size:22px;font-weight:600}
.section-count{color:var(--muted);font-size:14px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:hover{border-color:var(--blue);background:var(--surface)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#0d1117;font-weight:600}
.btn-primary:hover{background:#79c0ff}
.btn-danger{border-color:var(--danger);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:600}
.btn-accent:hover{background:#ffe082}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.folder-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.folder-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--folder-color,var(--accent));opacity:.8}
.folder-card:hover{transform:translateY(-4px);border-color:var(--folder-color,var(--accent));box-shadow:0 8px 24px rgba(0,0,0,.4)}
.folder-card:hover .folder-actions{opacity:1}
.folder-icon{font-size:48px;margin-bottom:10px}
.folder-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;word-break:break-word}
.folder-count{font-size:11px;color:var(--muted)}
.folder-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .2s}
.folder-actions button{background:var(--card);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .2s}
.folder-actions button:hover{border-color:var(--blue)}
.folder-actions button.del-btn:hover{border-color:var(--danger);color:var(--danger)}
.quick-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;padding-top:20px;border-top:1px solid var(--border)}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:14px;cursor:pointer;transition:all .2s;font-family:inherit}
.back-btn:hover{background:var(--border);border-color:var(--blue)}
.folder-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.folder-title{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:600}
.folder-title-icon{font-size:24px}
.file-count-badge{font-size:12px;font-weight:500;color:var(--muted);background:var(--card);border-radius:12px;padding:3px 10px}
.file-list{display:flex;flex-direction:column;gap:4px}
.file-row{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;transition:all .2s}
.file-row:hover{background:var(--card);border-color:#484f58}
.file-row:hover .file-admin-actions{opacity:1}
.file-row-icon{font-size:28px;flex-shrink:0}
.file-row-info{flex:1;min-width:0}
.file-row-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-row-meta{font-size:12px;color:var(--muted);margin-top:2px}
.type-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.badge-html{background:#1a3a2a;color:var(--success)}
.badge-pdf{background:#3d1a1a;color:var(--danger)}
.file-admin-actions{display:flex;gap:4px;opacity:0;transition:opacity .2s;flex-shrink:0}
.file-admin-actions button{background:var(--card);border:1px solid var(--border);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .2s}
.file-admin-actions button:hover{border-color:var(--blue)}
.file-admin-actions button.del-btn:hover{border-color:var(--danger);color:var(--danger)}
.file-checkbox{width:18px;height:18px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.bulk-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;animation:fadeIn .2s}
.bulk-bar .bulk-count{font-size:13px;color:var(--muted)}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;color:var(--muted);transition:all .2s;margin-top:16px;cursor:pointer}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--blue);color:var(--blue);background:rgba(88,166,255,.05)}
.settings-panel{animation:fadeIn .3s}
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.settings-section h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--accent)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.form-group input,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--blue)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.toggle-row span{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:12px}
.toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:22px;transition:.2s}
.toggle-slider::before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:var(--text);border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:var(--blue)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(18px)}
.upload-panel{animation:fadeIn .3s}
.upload-progress{margin-top:12px}
.upload-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.upload-item .name{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upload-item .prog-bar{width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.upload-item .prog-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
.upload-item .status-icon{font-size:14px;width:24px;text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:420px;width:100%}
.modal-box h3{font-size:16px;font-weight:600;margin-bottom:12px}
.modal-box p{font-size:14px;color:var(--muted);margin-bottom:20px}
.modal-box .modal-actions{display:flex;gap:10px;justify-content:flex-end}
.empty-state{text-align:center;padding:48px;color:var(--muted);font-size:15px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:2000;animation:slideUp .3s;max-width:320px}
.toast.success{border-color:var(--success);color:var(--success)}
.toast.error{border-color:var(--danger);color:var(--danger)}
.footer{background:var(--surface);border-top:1px solid var(--border);padding:16px 24px;text-align:center}
.footer-links{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.footer-link{color:var(--blue);text-decoration:none;font-size:13px}
.footer-link:hover{text-decoration:underline}
.footer-sep{color:var(--border)}
.footer-copy{font-size:12px;color:#484f58}
.select-folder-list{max-height:200px;overflow-y:auto}
.select-folder-item{padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;font-size:14px}
.select-folder-item:hover{border-color:var(--blue);background:var(--card)}
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s}
.color-dot:hover,.color-dot.selected{border-color:var(--text);transform:scale(1.2)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.top-bar{padding:10px 16px}.main-content{padding:16px}.folder-grid{grid-template-columns:repeat(2,1fr);gap:12px}.folder-icon{font-size:36px}.folder-card{padding:16px 10px}.file-admin-actions{opacity:1}.folder-actions{opacity:1}.quick-actions{flex-direction:column}}
@media(max-width:480px){.folder-grid{grid-template-columns:repeat(2,1fr);gap:10px}.folder-icon{font-size:32px}.folder-name{font-size:12px}.top-bar{flex-direction:column;align-items:flex-start}.bulk-bar{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-container"></div>
<script>
// ==================== CONFIG ====================
const REPO_OWNER = 'purendar950';
const REPO_NAME = 'Hand-written-notes-sample-';
const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;
const CONFIG_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/config.json`;
const TELEGRAM_LINK = 'https://t.me/Exam_Zen_StudySync';
const EXCLUDED_FILES = ['index.html', 'manager.html', 'config.json'];
const FOLDER_COLORS = ['#ffd54f','#58a6ff','#3fb950','#f85149','#bc8cff','#ff7b72','#79c0ff','#d2a8ff','#7ee787','#ffa657'];

// ==================== STATE ====================
let folders = [];
let fileAssignments = {};
let hiddenFiles = [];
let displayNames = {};
let settings = { siteName: 'Parmar Railway Notes', siteSubtitle: 'Hand-Written Notes Library', telegramLink: TELEGRAM_LINK };
let allFiles = [];
let currentView = 'home'; // home, folder, settings, upload, visibility
let currentFolder = null;
let selectedFiles = new Set();
let configSha = null;
let publishStatus = '';
let uploadQueue = [];
let fileOrder = {};

// ==================== INIT ====================
async function init() {
  await loadState();
  await loadFiles();
  await fetchTrafficStats();
  render();
}

async function loadState() {
  const token = localStorage.getItem('mgr_github_token');

  // 1) Authenticated Contents API — immediately consistent (no raw CDN lag).
  //    This is what makes a move/hide survive a refresh. It also captures the
  //    current SHA so the next publish can't fail with a 409 conflict.
  if (token) {
    try {
      const res = await fetch(API_URL + 'config.json?t=' + Date.now(), {
        headers: { 'Authorization': `token ${token}` }, cache: 'no-store'
      });
      if (res.ok) {
        const meta = await res.json();
        configSha = meta.sha;
        const json = decodeURIComponent(escape(atob((meta.content || '').replace(/\n/g, ''))));
        applyConfig(JSON.parse(json));
        saveLocal();
        return;
      }
    } catch(e) { console.error('API config load failed, trying raw CDN:', e); }
  }

  // 2) Public raw CDN fallback (may lag a few minutes behind a fresh write).
  try {
    const res = await fetch(CONFIG_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (res.ok) {
      applyConfig(await res.json());
      saveLocal();
      return;
    }
  } catch(e) { console.error('Config load error, using offline fallback:', e); }

  // 3) Network failed — fall back to last known state from localStorage.
  const localFolders = localStorage.getItem('mgr_folders');
  if (localFolders) {
    folders = JSON.parse(localFolders);
    fileAssignments = JSON.parse(localStorage.getItem('mgr_assignments') || '{}');
    hiddenFiles = JSON.parse(localStorage.getItem('mgr_hidden') || '[]');
    displayNames = JSON.parse(localStorage.getItem('mgr_displayNames') || '{}');
    fileOrder = JSON.parse(localStorage.getItem('mgr_fileOrder') || '{}');
    const s = JSON.parse(localStorage.getItem('mgr_settings') || '{}');
    if (s.siteName) settings.siteName = s.siteName;
    if (s.siteSubtitle) settings.siteSubtitle = s.siteSubtitle;
    if (s.telegramLink) settings.telegramLink = s.telegramLink;
  }
}

function applyConfig(data) {
  folders = data.folders || [];
  fileAssignments = data.fileAssignments || {};
  hiddenFiles = data.hiddenFiles || [];
  displayNames = data.displayNames || {};
  fileOrder = data.fileOrder || {};
  if (data.siteName) settings.siteName = data.siteName;
  if (data.siteSubtitle) settings.siteSubtitle = data.siteSubtitle;
  if (data.telegramLink) settings.telegramLink = data.telegramLink;
}

async function loadFiles() {
  try {
    const token = localStorage.getItem('mgr_github_token');
    const headers = token ? { 'Authorization': `token ${token}` } : {};
    const res = await fetch(API_URL, { headers });
    if (res.ok) {
      const data = await res.json();
      allFiles = data.filter(f => f.type === 'file' && !EXCLUDED_FILES.includes(f.name) && !f.name.startsWith('.'));
    }
  } catch(e) { console.error('Files load error:', e); allFiles = []; }
}

// ==================== PERSISTENCE ====================
function saveLocal() {
  localStorage.setItem('mgr_folders', JSON.stringify(folders));
  localStorage.setItem('mgr_assignments', JSON.stringify(fileAssignments));
  localStorage.setItem('mgr_hidden', JSON.stringify(hiddenFiles));
  localStorage.setItem('mgr_displayNames', JSON.stringify(displayNames));
  localStorage.setItem('mgr_fileOrder', JSON.stringify(fileOrder));
  localStorage.setItem('mgr_settings', JSON.stringify(settings));
}

function saveAndPublish() {
  saveLocal();
  doPublish();
}

function setStatus(msg) {
  publishStatus = msg;
  const el = document.getElementById('publish-status');
  if (el) {
    el.textContent = msg;
    el.className = 'publish-status' + (msg.includes('✅') ? ' ok' : msg.includes('❌') || msg.includes('⚠️') ? ' err' : '');
  }
}

async function doPublish() {
  const token = localStorage.getItem('mgr_github_token');
  if (!token) { setStatus('⚠️ No token'); return; }
  setStatus('⏳ Publishing...');
  try {
    const configData = {
      folders: folders.filter(f => f.id !== 'root' && f.id !== '__unassigned__'),
      fileAssignments, displayNames, hiddenFiles, fileOrder,
      telegramLink: settings.telegramLink || TELEGRAM_LINK,
      siteName: settings.siteName || 'Parmar Railway Notes',
      siteSubtitle: settings.siteSubtitle || 'Hand-Written Notes Library',
      lastUpdated: new Date().toISOString().split('T')[0]
    };
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(configData, null, 2))));
    // Always fetch the freshest SHA right before writing (cache-busted) so a
    // stale cached SHA can't cause a 409 conflict, and retry once if it does.
    const fetchSha = async () => {
      try {
        const shaRes = await fetch(API_URL + 'config.json?t=' + Date.now(), {
          headers: { 'Authorization': `token ${token}` }, cache: 'no-store'
        });
        if (shaRes.ok) { const d = await shaRes.json(); return d.sha; }
      } catch(e) { console.error('SHA fetch failed:', e); }
      return null;
    };
    let sha = await fetchSha();
    for (let attempt = 0; attempt < 2; attempt++) {
      const body = { message: 'Update config from manager', content, branch: 'main' };
      if (sha) body.sha = sha;
      const res = await fetch(API_URL + 'config.json', {
        method: 'PUT',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) { const d = await res.json(); configSha = d.content.sha; setStatus('✅ Published'); return; }
      // 409/422 = SHA conflict (config changed elsewhere). Re-fetch and retry once.
      if (res.status === 409 || res.status === 422) { sha = await fetchSha(); continue; }
      const err = await res.json().catch(() => ({}));
      setStatus('❌ Failed: ' + (err.message || res.status));
      console.error(err);
      return;
    }
    setStatus('❌ Failed (conflict — try again)');
  } catch(e) { setStatus('❌ Error'); console.error(e); }
}

// ==================== HELPERS ====================
function toast(msg, type = '') {
  const container = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}

function confirm(title, message, onConfirm) {
  const el = document.createElement('div');
  el.className = 'modal-overlay';
  el.innerHTML = `<div class="modal-box"><h3>${title}</h3><p>${message}</p><div class="modal-actions"><button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn btn-danger" id="confirm-ok">Confirm</button></div></div>`;
  document.body.appendChild(el);
  el.querySelector('#confirm-ok').onclick = () => { el.remove(); onConfirm(); };
  el.onclick = (e) => { if (e.target === el) el.remove(); };
}

function promptInput(title, label, defaultVal, onSubmit) {
  const el = document.createElement('div');
  el.className = 'modal-overlay';
  el.innerHTML = `<div class="modal-box"><h3>${title}</h3><div class="form-group"><label>${label}</label><input type="text" id="prompt-input" value="${defaultVal || ''}"></div><div class="modal-actions"><button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn btn-primary" id="prompt-ok">OK</button></div></div>`;
  document.body.appendChild(el);
  const input = el.querySelector('#prompt-input');
  input.focus();
  input.select();
  el.querySelector('#prompt-ok').onclick = () => { const v = input.value.trim(); if(v) { el.remove(); onSubmit(v); } };
  input.onkeydown = (e) => { if(e.key === 'Enter') { const v = input.value.trim(); if(v) { el.remove(); onSubmit(v); } } };
  el.onclick = (e) => { if (e.target === el) el.remove(); };
}

function getFileIcon(name) {
  const n = name.toLowerCase();
  if (n.includes('music')) return '🎵';
  if (n.includes('festival')) return '🎉';
  if (n.includes('culture') || n.includes('architecture')) return '🏛️';
  if (n.includes('book') || n.includes('author')) return '📚';
  if (n.includes('current') || n.includes('affairs') || n.includes('gk')) return '📰';
  if (n.endsWith('.pdf')) return '📕';
  return '📄';
}

function getFileType(name) {
  if (name.endsWith('.pdf')) return 'PDF';
  if (name.endsWith('.html') || name.endsWith('.htm')) return 'HTML';
  return 'FILE';
}

function getDisplayName(filename) {
  if (displayNames[filename]) return displayNames[filename];
  return filename.replace(/\.(html|htm|pdf)$/i, '');
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function getFilesInFolder(folderId) {
  return allFiles.filter(f => fileAssignments[f.name] === folderId);
}

function getUnassignedFiles() {
  const assigned = Object.keys(fileAssignments);
  return allFiles.filter(f => !assigned.includes(f.name));
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== FOLDER ACTIONS ====================
function createFolder() {
  const el = document.createElement('div');
  el.className = 'modal-overlay';
  el.innerHTML = `<div class="modal-box">
    <h3>📂 Create New Folder</h3>

function renameFolder(folderId) {

    folder.name = newName;

    toast('Folder renamed', 'success');
    render();
  });
}

function deleteFolder(folderId) {
  const folder = folders.find(f => f.id === folderId);
  if (!folder) return;
  confirm('Delete Folder', `Are you sure you want to delete "${folder.name}"? Files will be moved to unassigned.`, () => {
    // Move files to unassigned

function renameDisplayName(filename) {

    toast('Display name updated', 'success');

function toggleFileVisibility(filename) {
  const idx = hiddenFiles.indexOf(filename);
  if (idx >= 0) { hiddenFiles.splice(idx, 1); toast('File shown', 'success'); }
  else { hiddenFiles.push(filename); toast('File hidden', 'success'); }
  saveAndPublish();
  render();
}

async function deleteFileFromRepo(filename) {
  confirm('Delete File', `Permanently delete "${escapeHtml(filename)}" from the repository? This cannot be undone.`, async () => {
    const token = localStorage.getItem('mgr_github_token');
    if (!token) { toast('No GitHub token set', 'error'); return; }
    try {
      const res = await fetch(API_URL + encodeURIComponent(filename), { headers: { 'Authorization': `token ${token}` } });
      if (!res.ok) { toast('Failed to get file info', 'error'); return; }
      const fileData = await res.json();
      const delRes = await fetch(API_URL + encodeURIComponent(filename), {
        method: 'DELETE',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: `Delete ${filename}`, sha: fileData.sha, branch: 'main' })
      });
      if (delRes.ok) {
        allFiles = allFiles.filter(f => f.name !== filename);
        delete fileAssignments[filename];
        delete displayNames[filename];
        hiddenFiles = hiddenFiles.filter(f => f !== filename);
        saveAndPublish();
        toast('File deleted from repo', 'success');
        render();
      } else { toast('Delete failed', 'error'); }
    } catch(e) { toast('Error: ' + e.message, 'error'); }
  });
}

// ==================== BULK ACTIONS ====================
function toggleSelectFile(filename) {

}

function selectAllFiles(fileObjs) {

function bulkMove() {

function bulkHide() {

  toast('Files hidden', 'success');

function bulkDelete() {
  confirm('Delete Files', `Delete ${selectedFiles.size} file(s) from the repository? This cannot be undone.`, async () => {
    const token = localStorage.getItem('mgr_github_token');
    if (!token) { toast('No token', 'error'); return; }
    for (const fname of selectedFiles) {
      try {
        const res = await fetch(API_URL + encodeURIComponent(fname), { headers: { 'Authorization': `token ${token}` } });
        if (!res.ok) continue;
        const d = await res.json();

          method: 'DELETE',
          headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `Delete ${fname}`, sha: d.sha, branch: 'main' })
        });
        allFiles = allFiles.filter(f => f.name !== fname);

        delete displayNames[fname];
        hiddenFiles = hiddenFiles.filter(f => f !== fname);

    saveAndPublish();
    toast('Files deleted', 'success');
    render();
  });

let draggedFileName = null;
function fileDragStart(e, filename) { draggedFileName = filename; e.dataTransfer.effectAllowed = 'move'; e.target.style.opacity = '0.4'; }
function fileDragEnd(e) { e.target.style.opacity = '1'; draggedFileName = null; }
function folderDragOver(e) { e.preventDefault(); e.currentTarget.style.borderColor = 'var(--blue)'; e.currentTarget.style.background = 'rgba(88,166,255,.08)'; }
function folderDragLeave(e) { e.currentTarget.style.borderColor = ''; e.currentTarget.style.background = ''; }
function folderDrop(e, folderId) {
  e.preventDefault(); e.currentTarget.style.borderColor = ''; e.currentTarget.style.background = '';
  if (!draggedFileName) return;
  if (folderId === '__unassigned__') delete fileAssignments[draggedFileName];
  else fileAssignments[draggedFileName] = folderId;
  draggedFileName = null; saveAndPublish(); toast('File moved!', 'success'); render();
}
let draggedFolderIdx = null;
function folderReorderDragStart(e, idx) { draggedFolderIdx = idx; e.dataTransfer.effectAllowed = 'move'; e.target.style.opacity = '0.4'; }
function folderReorderDragEnd(e) { e.target.style.opacity = '1'; draggedFolderIdx = null; }
function folderReorderDrop(e, targetIdx) {

  const [moved] = folders.splice(draggedFolderIdx, 1); folders.splice(targetIdx, 0, moved);
  folders.forEach((f, i) => f.order = i); draggedFolderIdx = null;
  saveAndPublish(); toast('Folders reordered', 'success'); render();
}

// ==================== FILE SORTING & REORDER ====================
function sortFilesBy(criteria) {
  let files = currentFolder.id === '__unassigned__' ? getUnassignedFiles() : getFilesInFolder(currentFolder.id);
  if (criteria === 'name') files.sort((a,b) => getDisplayName(a.name).localeCompare(getDisplayName(b.name)));
  else if (criteria === 'size') files.sort((a,b) => (b.size||0) - (a.size||0));
  else if (criteria === 'type') files.sort((a,b) => a.name.split('.').pop().localeCompare(b.name.split('.').pop()));
  files.forEach((f, i) => { fileOrder[f.name] = i + 1; });
  saveAndPublish(); toast('Sorted by ' + criteria, 'success'); render();
}
function autoNumberFiles() {
  let files = currentFolder.id === '__unassigned__' ? getUnassignedFiles() : getFilesInFolder(currentFolder.id);
  files.sort((a,b) => { const oA = fileOrder[a.name]||9999; const oB = fileOrder[b.name]||9999; return oA-oB; });
  files.forEach((f, i) => { fileOrder[f.name] = i + 1; });
  saveAndPublish(); toast('Numbered 1 to ' + files.length, 'success'); render();
}
function setSerialNumber(filename) {
  promptInput('Set Serial #', 'Number for "' + getDisplayName(filename) + '":', (fileOrder[filename]||'').toString(), (val) => {
    const num = parseInt(val); if (isNaN(num)) { toast('Enter a number', 'error'); return; }
    fileOrder[filename] = num; saveAndPublish(); toast('Serial # set to ' + num, 'success'); render();
  });
}
function moveFileUp(idx) {
  let files = currentFolder.id === '__unassigned__' ? getUnassignedFiles() : getFilesInFolder(currentFolder.id);
  files.sort((a,b) => { const oA = fileOrder[a.name]||9999; const oB = fileOrder[b.name]||9999; return oA-oB; });
  if (idx <= 0) return;
  const t = fileOrder[files[idx].name]||idx+1; fileOrder[files[idx].name] = fileOrder[files[idx-1].name]||idx; fileOrder[files[idx-1].name] = t;
  saveAndPublish(); render();
}
function moveFileDown(idx) {
  let files = currentFolder.id === '__unassigned__' ? getUnassignedFiles() : getFilesInFolder(currentFolder.id);
  files.sort((a,b) => { const oA = fileOrder[a.name]||9999; const oB = fileOrder[b.name]||9999; return oA-oB; });
  if (idx >= files.length-1) return;
  const t = fileOrder[files[idx].name]||idx+1; fileOrder[files[idx].name] = fileOrder[files[idx+1].name]||idx+2; fileOrder[files[idx+1].name] = t;
  saveAndPublish(); render();
}

// ==================== UPLOAD ====================
async function uploadFiles(files) {
  const token = localStorage.getItem('mgr_github_token');
  if (!token) { toast('Set GitHub token first', 'error'); return; }
  uploadQueue = Array.from(files).filter(f => /\.(html|htm|pdf)$/i.test(f.name)).map(f => ({ file: f, name: f.name, progress: 0, status: 'pending' }));
  if (uploadQueue.length === 0) { toast('Only .html and .pdf files allowed', 'error'); return; }
  currentView = 'upload';
  render();
  // Next free serial number across all files, so newly uploaded files append to
  // the end and never renumber/disorganise files that already have a serial.
  const existingSerials = Object.values(fileOrder).filter(n => typeof n === 'number' && !isNaN(n));
  let nextSerial = (existingSerials.length ? Math.max(...existingSerials) : 0) + 1;
  for (const item of uploadQueue) {
    item.status = 'uploading';
    render();
    try {
      const reader = new FileReader();
      const base64 = await new Promise((resolve, reject) => {
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(item.file);
      });
      // Check if file exists
      let sha = null;
      const checkRes = await fetch(API_URL + encodeURIComponent(item.name), { headers: { 'Authorization': `token ${token}` } });
      if (checkRes.ok) { const d = await checkRes.json(); sha = d.sha; }
      const body = { message: `Upload ${item.name}`, content: base64, branch: 'main' };
      if (sha) body.sha = sha;
      item.progress = 50;
      render();
      const res = await fetch(API_URL + encodeURIComponent(item.name), {
        method: 'PUT',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        item.progress = 100;
        item.status = 'done';
        const d = await res.json();
        if (!allFiles.find(f => f.name === item.name)) {
          allFiles.push({ name: item.name, size: item.file.size, type: 'file', sha: d.content.sha });
        }
        // Assign to current folder if inside one
        if (currentFolder && currentFolder.id !== '__unassigned__') {
          fileAssignments[item.name] = currentFolder.id;
        }
        // Give brand-new files the next serial number. Existing files keep
        // their numbers, so the established order is never disturbed.
        if (fileOrder[item.name] === undefined) {
          fileOrder[item.name] = nextSerial++;
        }
      } else { item.status = 'error'; item.progress = 0; }
    } catch(e) { item.status = 'error'; item.progress = 0; }
    render();
  }
  saveAndPublish();
  toast('Upload complete', 'success');
}

// ==================== TRAFFIC STATS ====================
let trafficData = { views: 0, uniques: 0, daily: [] };

async function fetchTrafficStats() {
  const token = localStorage.getItem('mgr_github_token');
  if (!token) return;
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/traffic/views`, {
      headers: { 'Authorization': `token ${token}` }
    });
    if (res.ok) {
      const data = await res.json();
      trafficData.views = data.count || 0;
      trafficData.uniques = data.uniques || 0;
      trafficData.daily = data.views || [];
    }
  } catch(e) { console.warn('Traffic fetch failed:', e); }
}

function renderTrafficStats() {
  const today = new Date().toISOString().split('T')[0];
  const todayViews = trafficData.daily.find(d => d.timestamp && d.timestamp.startsWith(today));
  const todayCount = todayViews ? todayViews.count : 0;
  const todayUniques = todayViews ? todayViews.uniques : 0;

  // Last 7 days chart
  const last7 = trafficData.daily.slice(-7);
  const maxViews = Math.max(...last7.map(d => d.count || 0), 1);
  const bars = last7.map(d => {
    const height = Math.max(((d.count || 0) / maxViews) * 100, 4);
    const day = new Date(d.timestamp).toLocaleDateString('en', { weekday: 'short' });
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
      <span style="font-size:10px;color:var(--muted)">${d.count || 0}</span>
      <div style="width:100%;max-width:32px;height:${height}px;background:var(--blue);border-radius:4px;min-height:4px"></div>
      <span style="font-size:10px;color:var(--muted)">${day}</span>
    </div>`;
  }).join('');

  return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <span style="font-size:18px">📊</span>
      <span style="font-size:15px;font-weight:600;color:var(--text)">Page Views (Last 14 days)</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px">
      <div style="background:var(--card);border-radius:8px;padding:12px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:var(--accent)">${todayCount}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Today Views</div>
      </div>
      <div style="background:var(--card);border-radius:8px;padding:12px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:var(--blue)">${todayUniques}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Today Unique</div>
      </div>
      <div style="background:var(--card);border-radius:8px;padding:12px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:var(--success)">${trafficData.views}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Total Views (14d)</div>
      </div>
      <div style="background:var(--card);border-radius:8px;padding:12px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:#bc8cff">${trafficData.uniques}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Unique Visitors</div>
      </div>
    </div>
    <div style="display:flex;align-items:flex-end;gap:4px;height:80px;padding:0 4px">${bars || '<span style="color:var(--muted);font-size:12px">No data yet. Token required for traffic stats.</span>'}</div>
  </div>`;
}

// ==================== RENDER ====================
function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderTopBar() + '<main class="main-content">' + renderCurrentView() + '</main>' + renderFooter();
  attachGlobalEvents();
}

function renderTopBar() {
  let breadcrumb = '<span class="bc-link" onclick="goHome()">Home</span>';
  if (currentView === 'folder' && currentFolder) {
    breadcrumb += `<span class="bc-sep">›</span><span class="bc-current">${currentFolder.icon || '📁'} ${escapeHtml(currentFolder.name)}</span>`;
  } else if (currentView === 'settings') {
    breadcrumb += '<span class="bc-sep">›</span><span class="bc-current">⚙️ Settings</span>';
  } else if (currentView === 'upload') {
    breadcrumb += '<span class="bc-sep">›</span><span class="bc-current">⬆️ Upload</span>';
  } else if (currentView === 'visibility') {
    breadcrumb += '<span class="bc-sep">›</span><span class="bc-current">👁️ Visibility</span>';
  }
  return `<header class="top-bar">
    <div class="top-bar-left">
      <div class="site-title">📋 File Manager</div>
      <div class="breadcrumb">${breadcrumb}</div>
    </div>
    <div class="top-bar-right">
      <span class="publish-status" id="publish-status">${publishStatus || '—'}</span>
      <button class="icon-btn" onclick="currentView='settings';render();" title="Settings">⚙️</button>
    </div>
  </header>`;
}

function renderCurrentView() {
  switch(currentView) {
    case 'home': return renderHomeView();
    case 'folder': return renderFolderView();
    case 'settings': return renderSettingsView();
    case 'upload': return renderUploadView();
    case 'visibility': return renderVisibilityView();
    default: return renderHomeView();
  }
}

function renderHomeView() {

      <div class="folder-icon">📂</div>

  }

    ${renderTrafficStats()}

      <h2>📂 Folders</h2>
      <span class="section-count">${folders.length} folder${folders.length !== 1 ? 's' : ''}</span>
      <button class="btn btn-primary" onclick="createFolder()" style="margin-left:auto">+ New Folder</button>
    </div>
    <div class="folder-grid">${folderCards || '<div class="empty-state">No folders yet. Create one!</div>'}</div>
    <div class="quick-actions">
      <button class="btn" onclick="currentView='upload';render()">⬆️ Upload Files</button>
      <button class="btn" onclick="currentView='settings';render()">⚙️ Settings</button>
      <button class="btn" onclick="currentView='visibility';render()">👁️ Show/Hide Files</button>
    </div>
  </div>`;
}

function renderFolderView() {
  if (!currentFolder) return renderHomeView();
  let files = currentFolder.id === '__unassigned__' ? getUnassignedFiles() : getFilesInFolder(currentFolder.id);
  files.sort((a, b) => { const oA = fileOrder[a.name] !== undefined ? fileOrder[a.name] : 9999; const oB = fileOrder[b.name] !== undefined ? fileOrder[b.name] : 9999; return oA - oB; });
  const hasSelected = selectedFiles.size > 0;

  let bulkBar = '';
  if (hasSelected) {
    bulkBar = `<div class="bulk-bar">
      <span class="bulk-count">${selectedFiles.size} selected</span>
      <button class="btn" onclick="bulkMove()">📂 Move to...</button>
      <button class="btn" onclick="bulkHide()">🙈 Hide</button>
      <button class="btn btn-danger" onclick="bulkDelete()">🗑️ Delete</button>
    </div>`;
  }

  let selectAll = '';
  if (files.length > 0) {
    const allSel = files.every(f => selectedFiles.has(f.name));
    selectAll = `<div style="margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <input type="checkbox" class="file-checkbox" ${allSel ? 'checked' : ''} onchange="selectAllFiles(${JSON.stringify(files.map(f=>({name:f.name}))).replace(/"/g,'&quot;')})">
      <span style="font-size:13px;color:var(--muted)">Select All</span>
    </div>`;
  }

  let fileRows = files.map((f, idx) => {
    const icon = getFileIcon(f.name);
    const name = getDisplayName(f.name);
    const type = getFileType(f.name);
    const size = formatSize(f.size);
    const typeClass = type === 'PDF' ? 'badge-pdf' : 'badge-html';
    const isHidden = hiddenFiles.includes(f.name);
    const isSelected = selectedFiles.has(f.name);
    const visIcon = isHidden ? '🙈' : '👁️';
    const serial = fileOrder[f.name] !== undefined ? fileOrder[f.name] : idx + 1;
    return `<div class="file-row">
      <span style="min-width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0">${serial}</span>
      <input type="checkbox" class="file-checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelectFile('${f.name.replace(/'/g,"\\'")}')">
      <div class="file-row-icon">${icon}</div>
      <div class="file-row-info">
        <div class="file-row-name">${escapeHtml(name)}${isHidden ? ' <span style="color:var(--muted);font-size:11px">(hidden)</span>' : ''}</div>
        <div class="file-row-meta">${f.name} ${size ? '• ' + size : ''}</div>
      </div>
      <span class="type-badge ${typeClass}">${type}</span>
      <div class="file-admin-actions">
        <button onclick="moveFileUp(${idx})" title="Move Up" ${idx===0?'style="opacity:.3"':''}>⬆️</button>
        <button onclick="moveFileDown(${idx})" title="Move Down" ${idx===files.length-1?'style="opacity:.3"':''}>⬇️</button>
        <button onclick="setSerialNumber('${f.name.replace(/'/g,"\\'")}')" title="Set #">🔢</button>
        <button onclick="moveFile('${f.name.replace(/'/g,"\\'")}')" title="Move to folder">📂</button>
        <button onclick="toggleFileVisibility('${f.name.replace(/'/g,"\\'")}')" title="${isHidden ? 'Show' : 'Hide'}">${visIcon}</button>
        <button onclick="renameDisplayName('${f.name.replace(/'/g,"\\'")}')" title="Rename">✏️</button>
        <button class="del-btn" onclick="deleteFileFromRepo('${f.name.replace(/'/g,"\\'")}')" title="Delete">🗑️</button>
      </div>
    </div>`;
  }).join('');

  if (files.length === 0) fileRows = '<div class="empty-state">No files in this folder</div>';

  return `<div class="folder-view" style="animation:fadeIn .3s">
    <div class="folder-header">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <div class="folder-title">
        <span class="folder-title-icon">${currentFolder.icon || '📁'}</span>
        <span>${escapeHtml(currentFolder.name)}</span>
        <span class="file-count-badge">${files.length} file${files.length !== 1 ? 's' : ''}</span>
      </div>
    </div>
    ${bulkBar}
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <span style="font-size:12px;color:var(--muted)">Sort:</span>
      <button class="btn" style="padding:5px 10px;font-size:12px" onclick="sortFilesBy('name')">A-Z</button>
      <button class="btn" style="padding:5px 10px;font-size:12px" onclick="sortFilesBy('size')">Size</button>
      <button class="btn" style="padding:5px 10px;font-size:12px" onclick="sortFilesBy('type')">Type</button>
      <button class="btn btn-accent" style="padding:5px 10px;font-size:12px" onclick="autoNumberFiles()">🔢 Auto Number</button>
    </div>
    ${selectAll}
    <div class="file-list">${fileRows}</div>
    <div class="drop-zone" id="folder-drop-zone" onclick="document.getElementById('folder-file-input').click()">
      <p style="font-size:24px;margin-bottom:8px">📁</p>
      <p>Drop files here to add to this folder</p>
      <p style="font-size:12px;margin-top:4px">or click to browse (.html, .pdf)</p>
    </div>
    <input type="file" id="folder-file-input" accept=".html,.htm,.pdf,.HTML,.PDF" multiple style="display:none" onchange="uploadFiles(this.files)">
  </div>`;
}

function renderSettingsView() {
  const token = localStorage.getItem('mgr_github_token') || '';
  const hasToken = token.length > 0;
  return `<div class="settings-panel">
    <div class="folder-header">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <div class="folder-title"><span class="folder-title-icon">⚙️</span><span>Settings</span></div>
    </div>
    <div class="settings-section">
      <h3>🔑 GitHub Token</h3>
      <div class="form-group">
        <label>Personal Access Token (required for publishing)</label>
        <input type="password" id="settings-token" value="${token}" placeholder="ghp_xxxxxxxxxxxx">
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-primary" onclick="saveToken()">Save Token</button>
        <button class="btn btn-danger" onclick="clearToken()">Clear</button>
        <span style="font-size:12px;color:var(--muted)">${hasToken ? '✅ Token set' : '⚠️ No token'}</span>
      </div>
    </div>
    <div class="settings-section">
      <h3>🌐 Site Settings</h3>
      <div class="form-group"><label>Site Name</label><input type="text" id="settings-sitename" value="${escapeHtml(settings.siteName)}"></div>
      <div class="form-group"><label>Subtitle</label><input type="text" id="settings-subtitle" value="${escapeHtml(settings.siteSubtitle)}"></div>
      <div class="form-group"><label>Telegram Link</label><input type="text" id="settings-telegram" value="${escapeHtml(settings.telegramLink)}"></div>
      <button class="btn btn-primary" onclick="saveSiteSettings()">Save Settings</button>
    </div>
    <div class="settings-section">
      <h3>📦 Import / Export</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="exportConfig()">⬇️ Export config.json</button>
        <button class="btn" onclick="document.getElementById('import-input').click()">⬆️ Import config.json</button>
        <input type="file" id="import-input" accept=".json" style="display:none" onchange="importConfig(this.files[0])">
      </div>
    </div>
    <div class="settings-section">
      <h3>⚠️ Danger Zone</h3>
      <button class="btn btn-danger" onclick="resetAllData()">🗑️ Reset All Local Data</button>
    </div>
  </div>`;
}

function renderUploadView() {
  let queueHtml = '';
  if (uploadQueue.length > 0) {
    queueHtml = '<div class="upload-progress">' + uploadQueue.map(item => {
      const statusIcon = item.status === 'done' ? '✅' : item.status === 'error' ? '❌' : item.status === 'uploading' ? '⏳' : '⏸️';
      return `<div class="upload-item">
        <span class="status-icon">${statusIcon}</span>
        <span class="name">${escapeHtml(item.name)}</span>
        <div class="prog-bar"><div class="prog-fill" style="width:${item.progress}%"></div></div>
      </div>`;
    }).join('') + '</div>';
  }
  return `<div class="upload-panel">
    <div class="folder-header">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <div class="folder-title"><span class="folder-title-icon">⬆️</span><span>Upload Files</span></div>
    </div>
    <div class="drop-zone" id="upload-drop-zone" onclick="document.getElementById('upload-file-input').click()">
      <p style="font-size:36px;margin-bottom:12px">📁</p>
      <p style="font-size:16px;font-weight:500">Drag & drop files here</p>
      <p style="font-size:13px;margin-top:6px;color:var(--muted)">or click to browse • Accepts .html and .pdf files</p>
    </div>
    <input type="file" id="upload-file-input" accept=".html,.htm,.pdf,.HTML,.PDF" multiple style="display:none" onchange="uploadFiles(this.files)">
    ${queueHtml}
  </div>`;
}

function renderVisibilityView() {
  let rows = allFiles.map(f => {
    const isVisible = !hiddenFiles.includes(f.name);
    return `<div class="toggle-row">
      <span>${getFileIcon(f.name)} ${escapeHtml(getDisplayName(f.name))}</span>
      <label class="toggle-switch">
        <input type="checkbox" ${isVisible ? 'checked' : ''} onchange="toggleFileVisibility('${f.name.replace(/'/g,"\\'")}')">
        <span class="toggle-slider"></span>
      </label>
    </div>`;
  }).join('');
  return `<div class="settings-panel">
    <div class="folder-header">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <div class="folder-title"><span class="folder-title-icon">👁️</span><span>Show/Hide Files</span></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn" onclick="showAllFiles()">👁️ Show All</button>
      <button class="btn" onclick="hideAllFiles()">🙈 Hide All</button>
    </div>
    ${rows || '<div class="empty-state">No files found</div>'}
  </div>`;
}

function renderFooter() {
  return `<footer class="footer">
    <div class="footer-links">
      <a href="index.html" class="footer-link">📚 View Library</a>
      <span class="footer-sep">•</span>
      <a href="${settings.telegramLink}" target="_blank" class="footer-link">📱 Telegram</a>
      <span class="footer-sep">•</span>
      <a href="https://github.com/${REPO_OWNER}/${REPO_NAME}" target="_blank" class="footer-link">⭐ GitHub</a>
    </div>
    <div class="footer-copy">© 2026 ${escapeHtml(settings.siteName)} — Admin Panel</div>
  </footer>`;
}

// ==================== NAVIGATION ====================
function goHome() {
  currentView = 'home';
  currentFolder = null;
  selectedFiles.clear();
  render();
}

function openFolder(folderId) {
  if (folderId === '__unassigned__') {
    currentFolder = { id: '__unassigned__', name: 'Unassigned', icon: '📂', color: '#8b949e' };
  } else {
    currentFolder = folders.find(f => f.id === folderId);
  }
  if (currentFolder) {
    currentView = 'folder';
    selectedFiles.clear();
    render();
  }
}

// ==================== SETTINGS ACTIONS ====================
function saveToken() {
  const val = document.getElementById('settings-token').value.trim();
  if (val) { localStorage.setItem('mgr_github_token', val); toast('Token saved', 'success'); }
  else { toast('Enter a token', 'error'); }
  render();
}

function clearToken() {
  localStorage.removeItem('mgr_github_token');
  toast('Token cleared', 'success');
  render();
}

function saveSiteSettings() {
  settings.siteName = document.getElementById('settings-sitename').value.trim() || 'Parmar Railway Notes';
  settings.siteSubtitle = document.getElementById('settings-subtitle').value.trim() || 'Hand-Written Notes Library';
  settings.telegramLink = document.getElementById('settings-telegram').value.trim() || TELEGRAM_LINK;
  saveAndPublish();
  toast('Settings saved', 'success');
  render();
}

function exportConfig() {
  const configData = {
    folders, fileAssignments, displayNames, hiddenFiles, fileOrder,
    telegramLink: settings.telegramLink, siteName: settings.siteName, siteSubtitle: settings.siteSubtitle,
    lastUpdated: new Date().toISOString().split('T')[0]
  };
  const blob = new Blob([JSON.stringify(configData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'config.json';
  a.click();
  toast('Config exported', 'success');
}

function importConfig(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.folders) folders = data.folders;
      if (data.fileAssignments) fileAssignments = data.fileAssignments;
      if (data.displayNames) displayNames = data.displayNames;
      if (data.fileOrder) fileOrder = data.fileOrder;
      if (data.hiddenFiles) hiddenFiles = data.hiddenFiles;
      if (data.siteName) settings.siteName = data.siteName;
      if (data.siteSubtitle) settings.siteSubtitle = data.siteSubtitle;
      if (data.telegramLink) settings.telegramLink = data.telegramLink;
      saveAndPublish();
      toast('Config imported', 'success');
      render();
    } catch(err) { toast('Invalid JSON file', 'error'); }
  };
  reader.readAsText(file);
}

function resetAllData() {
  confirm('Reset All Data', 'This will clear all local data (folders, assignments, settings). Are you sure?', () => {
    localStorage.removeItem('mgr_folders');
    localStorage.removeItem('mgr_assignments');
    localStorage.removeItem('mgr_hidden');
    localStorage.removeItem('mgr_displayNames');
    localStorage.removeItem('mgr_settings');
    folders = [];
    fileAssignments = {};
    hiddenFiles = [];
    displayNames = {};
    settings = { siteName: 'Parmar Railway Notes', siteSubtitle: 'Hand-Written Notes Library', telegramLink: TELEGRAM_LINK };
    toast('All data reset', 'success');
    render();
  });
}

function showAllFiles() {
  hiddenFiles = [];
  saveAndPublish();
  toast('All files visible', 'success');
  render();
}

function hideAllFiles() {
  hiddenFiles = allFiles.map(f => f.name);
  saveAndPublish();
  toast('All files hidden', 'success');
  render();
}

// ==================== EVENTS ====================
function attachGlobalEvents() {
  // Drag & drop for upload zone
  const uploadZone = document.getElementById('upload-drop-zone');
  if (uploadZone) {
    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => { uploadZone.classList.remove('dragover'); });
    uploadZone.addEventListener('drop', (e) => { e.preventDefault(); uploadZone.classList.remove('dragover'); uploadFiles(e.dataTransfer.files); });
  }
  // Drag & drop for folder drop zone
  const folderZone = document.getElementById('folder-drop-zone');
  if (folderZone) {
    folderZone.addEventListener('dragover', (e) => { e.preventDefault(); folderZone.classList.add('dragover'); });
    folderZone.addEventListener('dragleave', () => { folderZone.classList.remove('dragover'); });
    folderZone.addEventListener('drop', (e) => { e.preventDefault(); folderZone.classList.remove('dragover'); uploadFiles(e.dataTransfer.files); });
  }
}

// ==================== START ====================
init();
</script>
</body>
</html>
