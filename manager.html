<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Manager - Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Chart.js for the dashboard analytics section (loaded async, dashboard degrades gracefully if unavailable) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
<!-- PDF.js renders existing PDFs onto canvas so they can be annotated; pdf-lib bakes the
     annotations back into a new PDF on save. Both load lazily/deferred and the Annotator
     shows a clear message if they are unavailable. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:radial-gradient(1200px 620px at 8% -8%,rgba(99,102,241,.20),transparent 58%),radial-gradient(1000px 520px at 112% 2%,rgba(34,211,238,.14),transparent 55%),var(--bg);background-attachment:fixed;color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
:root{--bg:#0b0f19;--surface:#131a29;--surface-2:#1a2233;--card:#1c2436;--accent:#ffd54f;--accent-2:#ff9e5e;--blue:#7aa2ff;--primary:#6366f1;--primary-2:#22d3ee;--grad:linear-gradient(135deg,#6366f1 0%,#22d3ee 100%);--grad-accent:linear-gradient(135deg,#ffd54f 0%,#ff9e5e 100%);--text:#e7ecf6;--muted:#93a0b8;--border:#28324a;--border-soft:rgba(255,255,255,.07);--danger:#f77066;--success:#45d483;--glass:rgba(17,23,38,.72);--ring:rgba(99,102,241,.4);--shadow-md:0 10px 30px -12px rgba(0,0,0,.6);--shadow-lg:0 24px 60px -18px rgba(0,0,0,.72);--radius:14px}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
.top-bar-left{display:flex;flex-direction:column;gap:4px}
.site-title{font-size:16px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px}
.breadcrumb{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}
.bc-link{cursor:pointer;color:var(--blue);transition:color .2s}
.bc-link:hover{color:#79c0ff}
.bc-sep{color:#484f58}
.bc-current{color:var(--text)}
.top-bar-right{display:flex;align-items:center;gap:12px}
.publish-status{font-size:12px;padding:4px 10px;border-radius:16px;background:var(--card);border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.publish-status.ok{color:var(--success);border-color:var(--success)}
.publish-status.err{color:var(--danger);border-color:var(--danger)}
.icon-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s;color:var(--text)}
.icon-btn:hover{border-color:var(--blue);background:var(--surface)}
.main-content{flex:1;padding:24px;max-width:1200px;margin:0 auto;width:100%}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.section-header h2{font-size:22px;font-weight:600}
.section-count{color:var(--muted);font-size:14px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:hover{border-color:var(--blue);background:var(--surface)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#0d1117;font-weight:600}
.btn-primary:hover{background:#79c0ff}
.btn-danger{border-color:var(--danger);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:600}
.btn-accent:hover{background:#ffe082}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.folder-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.folder-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--folder-color,var(--accent));opacity:.8}
.folder-card:hover{transform:translateY(-4px);border-color:var(--folder-color,var(--accent));box-shadow:0 8px 24px rgba(0,0,0,.4)}
.folder-card:hover .folder-actions{opacity:1}
.folder-icon{font-size:48px;margin-bottom:10px}
.folder-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;word-break:break-word}
.folder-count{font-size:11px;color:var(--muted)}
.folder-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .2s}
.folder-actions button{background:var(--card);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .2s}
.folder-actions button:hover{border-color:var(--blue)}
.folder-actions button.del-btn:hover{border-color:var(--danger);color:var(--danger)}
.quick-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;padding-top:20px;border-top:1px solid var(--border)}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:14px;cursor:pointer;transition:all .2s;font-family:inherit}
.back-btn:hover{background:var(--border);border-color:var(--blue)}
.folder-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.folder-title{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:600}
.folder-title-icon{font-size:24px}
.file-count-badge{font-size:12px;font-weight:500;color:var(--muted);background:var(--card);border-radius:12px;padding:3px 10px}
.file-list{display:flex;flex-direction:column;gap:4px}
.file-row{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;transition:all .2s}
.file-row:hover{background:var(--card);border-color:#484f58}
.file-row:hover .file-admin-actions{opacity:1}
.file-row-icon{font-size:28px;flex-shrink:0}
.file-row-info{flex:1;min-width:0}
.file-row-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-row-meta{font-size:12px;color:var(--muted);margin-top:2px}
.type-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.badge-html{background:#1a3a2a;color:var(--success)}
.badge-pdf{background:#3d1a1a;color:var(--danger)}
.file-admin-actions{display:flex;gap:4px;opacity:0;transition:opacity .2s;flex-shrink:0}
.file-admin-actions button{background:var(--card);border:1px solid var(--border);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .2s}
.file-admin-actions button:hover{border-color:var(--blue)}
.file-admin-actions button.del-btn:hover{border-color:var(--danger);color:var(--danger)}
.file-checkbox{width:18px;height:18px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.bulk-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;animation:fadeIn .2s}
.bulk-bar .bulk-count{font-size:13px;color:var(--muted)}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;color:var(--muted);transition:all .2s;margin-top:16px;cursor:pointer}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--blue);color:var(--blue);background:rgba(88,166,255,.05)}
.settings-panel{animation:fadeIn .3s}
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.settings-section h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--accent)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.form-group input,.form-group textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--blue)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.toggle-row span{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:12px}
.toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:22px;transition:.2s}
.toggle-slider::before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:var(--text);border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:var(--blue)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(18px)}
.upload-panel{animation:fadeIn .3s}
.upload-progress{margin-top:12px}
.upload-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.upload-item .name{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upload-item .prog-bar{width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.upload-item .prog-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
.upload-item .status-icon{font-size:14px;width:24px;text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:420px;width:100%}
.modal-box h3{font-size:16px;font-weight:600;margin-bottom:12px}
.modal-box p{font-size:14px;color:var(--muted);margin-bottom:20px}
.modal-box .modal-actions{display:flex;gap:10px;justify-content:flex-end}
.empty-state{text-align:center;padding:48px;color:var(--muted);font-size:15px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:2000;animation:slideUp .3s;max-width:320px}
.toast.success{border-color:var(--success);color:var(--success)}
.toast.error{border-color:var(--danger);color:var(--danger)}
.footer{background:var(--surface);border-top:1px solid var(--border);padding:16px 24px;text-align:center}
.footer-links{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.footer-link{color:var(--blue);text-decoration:none;font-size:13px}
.footer-link:hover{text-decoration:underline}
.footer-sep{color:var(--border)}
.footer-copy{font-size:12px;color:#484f58}
.select-folder-list{max-height:200px;overflow-y:auto}
.select-folder-item{padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;font-size:14px}
.select-folder-item:hover{border-color:var(--blue);background:var(--card)}
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s}
.color-dot:hover,.color-dot.selected{border-color:var(--text);transform:scale(1.2)}
/* ===== Modern theme refresh (midnight aurora) ===== */
::selection{background:rgba(99,102,241,.35)}
html{scroll-behavior:smooth}
*{scrollbar-width:thin;scrollbar-color:var(--border) transparent}
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;border:2px solid transparent;background-clip:content-box}
*::-webkit-scrollbar-thumb:hover{background:#3a465f}
button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
.top-bar{background:var(--glass);backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);border-bottom:1px solid var(--border-soft)}
.site-title{color:var(--accent)}
.publish-status{background:rgba(255,255,255,.04);border-color:var(--border-soft)}
.icon-btn{background:rgba(255,255,255,.04);border-color:var(--border-soft);border-radius:10px}
.icon-btn:hover{border-color:var(--primary);background:rgba(99,102,241,.14);transform:translateY(-1px)}
.section-header h2{letter-spacing:-.02em;font-weight:700}
.btn{background:rgba(255,255,255,.04);border:1px solid var(--border-soft);border-radius:10px;font-weight:600}
.btn:hover{border-color:var(--primary);background:rgba(99,102,241,.14);transform:translateY(-1px)}
.btn-primary{background:var(--grad);border:none;color:#fff;box-shadow:0 8px 20px -8px var(--ring)}
.btn-primary:hover{background:var(--grad);filter:brightness(1.08);transform:translateY(-2px);box-shadow:0 12px 26px -8px var(--ring)}
.btn-accent{background:var(--grad-accent);border:none;color:#20160a}
.btn-accent:hover{filter:brightness(1.06);transform:translateY(-2px)}
.btn-danger{background:rgba(247,112,102,.10);border-color:rgba(247,112,102,.5);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
.folder-grid{gap:18px}
.folder-card{background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--border-soft);border-radius:16px;box-shadow:var(--shadow-md);padding:22px 14px}
.folder-card::before{height:4px;opacity:.95;background:linear-gradient(90deg,var(--folder-color,var(--accent)),transparent)}
.folder-card:hover{transform:translateY(-6px);border-color:var(--folder-color,var(--primary));box-shadow:0 22px 44px -18px rgba(0,0,0,.7)}
.folder-icon{filter:drop-shadow(0 6px 14px rgba(0,0,0,.45))}
.folder-actions button{background:rgba(20,26,41,.7);border-color:var(--border-soft);backdrop-filter:blur(6px)}
.back-btn{background:rgba(255,255,255,.04);border-color:var(--border-soft);border-radius:10px}
.back-btn:hover{background:rgba(99,102,241,.14);border-color:var(--primary)}
.file-count-badge{background:rgba(255,255,255,.05);border:1px solid var(--border-soft)}
.file-list{gap:8px}
.file-row{background:linear-gradient(180deg,rgba(255,255,255,.02),transparent),var(--surface);border:1px solid var(--border-soft);border-radius:12px}
.file-row:hover{background:var(--card);border-color:var(--primary);transform:translateX(4px);box-shadow:var(--shadow-md)}
.file-admin-actions button{background:rgba(255,255,255,.05);border-color:var(--border-soft);border-radius:8px}
.file-admin-actions button:hover{border-color:var(--primary);background:rgba(99,102,241,.16)}
.file-checkbox{accent-color:var(--primary)}
.type-badge{border-radius:8px}
.badge-html{background:rgba(69,212,131,.15);color:var(--success)}
.badge-pdf{background:rgba(247,112,102,.15);color:var(--danger)}
.bulk-bar{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--border-soft);box-shadow:var(--shadow-md)}
.drop-zone{border:2px dashed var(--border);border-radius:16px;background:rgba(255,255,255,.02)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--primary);color:var(--primary);background:rgba(99,102,241,.09)}
.settings-section{background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--border-soft);box-shadow:var(--shadow-md);border-radius:16px}
.form-group input,.form-group textarea{background:rgba(0,0,0,.25);border:1px solid var(--border-soft);border-radius:10px}
.form-group input:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--ring)}
.toggle-row{background:rgba(255,255,255,.03);border:1px solid var(--border-soft);border-radius:10px}
.toggle-switch input:checked+.toggle-slider{background:var(--grad)}
.upload-item{background:rgba(255,255,255,.03);border:1px solid var(--border-soft);border-radius:10px}
.upload-item .prog-fill{background:var(--grad)}
.modal-overlay{background:rgba(5,8,15,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.modal-box{background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--border-soft);border-radius:18px;box-shadow:var(--shadow-lg)}
.toast{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border-soft);border-radius:12px;box-shadow:var(--shadow-lg)}
.select-folder-item{border:1px solid var(--border-soft);border-radius:10px}
.select-folder-item:hover{border-color:var(--primary);background:rgba(99,102,241,.1)}
.color-dot{box-shadow:0 2px 8px rgba(0,0,0,.4)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.top-bar{padding:10px 16px}.main-content{padding:16px}.folder-grid{grid-template-columns:repeat(2,1fr);gap:12px}.folder-icon{font-size:36px}.folder-card{padding:16px 10px}.file-admin-actions{opacity:1}.folder-actions{opacity:1}.quick-actions{flex-direction:column}}
@media(max-width:480px){.folder-grid{grid-template-columns:repeat(2,1fr);gap:10px}.folder-icon{font-size:32px}.folder-name{font-size:12px}.top-bar{flex-direction:column;align-items:flex-start}.bulk-bar{flex-direction:column;align-items:flex-start}}

/* ============================================================
   PREMIUM DASHBOARD REDESIGN (home screen only)
   Uses the requested palette: Indigo #6366F1, Violet #8B5CF6,
   Cyan #06B6D4, Success #10B981, Warning #F59E0B, Danger #EF4444.
   All existing view CSS above is untouched.
   ============================================================ */
:root{
  --violet:#8b5cf6;--cyan:#06b6d4;--warn:#f59e0b;
  --grad-primary:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);
  --grad-cyan:linear-gradient(135deg,#06b6d4 0%,#22d3ee 100%);
  --grad-success:linear-gradient(135deg,#10b981 0%,#34d399 100%);
  --grad-warn:linear-gradient(135deg,#f59e0b 0%,#fbbf24 100%);
  --grad-danger:linear-gradient(135deg,#ef4444 0%,#f87171 100%);
  --grad-violet:linear-gradient(135deg,#8b5cf6 0%,#6366f1 100%);
  --grad-hero:linear-gradient(120deg,#4338ca 0%,#6366f1 42%,#8b5cf6 72%,#06b6d4 120%);
}
/* ---------- Light theme (toggleable via body.light) ---------- */
body.light{
  --bg:#f4f6ff;--surface:#ffffff;--surface-2:#f6f8ff;--card:#eef2ff;
  --text:#0f172a;--muted:#64748b;--border:#e2e8f0;--border-soft:rgba(15,23,42,.08);
  --glass:rgba(255,255,255,.78);--shadow-md:0 10px 30px -14px rgba(31,41,80,.28);
  --shadow-lg:0 26px 60px -22px rgba(31,41,80,.34);--ring:rgba(99,102,241,.28);
  background:radial-gradient(1200px 620px at 8% -8%,rgba(99,102,241,.14),transparent 58%),radial-gradient(1000px 520px at 112% 2%,rgba(6,182,212,.12),transparent 55%),linear-gradient(180deg,#eef2ff 0%,#ffffff 42%,#f8fafc 100%);
}
body.light .site-title{color:#4f46e5}
body.light .badge-html{color:#059669}
body.light .badge-pdf{color:#dc2626}

/* Poppins for the dashboard surface */
.home-view{font-family:'Poppins','Inter',sans-serif}

/* ---------- Header enhancements ---------- */
.top-bar-right{align-items:center}
.header-search{position:relative;display:flex;align-items:center}
.header-search input{background:rgba(255,255,255,.05);border:1px solid var(--border-soft);border-radius:12px;padding:9px 14px 9px 36px;color:var(--text);font-size:13px;font-family:inherit;width:210px;transition:all .25s}
body.light .header-search input{background:#f1f5f9}
.header-search input::placeholder{color:var(--muted)}
.header-search input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--ring);width:250px}
.header-search .search-ico{position:absolute;left:12px;font-size:13px;opacity:.7;pointer-events:none}
.header-bell{position:relative}
.header-bell .bell-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--grad-danger);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(239,68,68,.5)}
.header-avatar{width:38px;height:38px;border-radius:12px;background:var(--grad-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;cursor:default;box-shadow:0 6px 16px -6px var(--ring);flex-shrink:0}
@media(max-width:600px){.header-search{display:none}}

/* ---------- Hero / welcome banner ---------- */
.dash-hero{position:relative;overflow:hidden;border-radius:26px;padding:30px 32px;margin-bottom:26px;background:var(--grad-hero);box-shadow:0 30px 70px -30px rgba(79,70,229,.65);isolation:isolate}
.dash-hero::before,.dash-hero::after{content:'';position:absolute;border-radius:50%;filter:blur(4px);z-index:-1}
.dash-hero::before{width:260px;height:260px;background:radial-gradient(circle,rgba(255,255,255,.28),transparent 70%);top:-120px;right:-40px;animation:heroFloat 8s ease-in-out infinite}
.dash-hero::after{width:200px;height:200px;background:radial-gradient(circle,rgba(6,182,212,.5),transparent 70%);bottom:-110px;left:20%;animation:heroFloat 10s ease-in-out infinite reverse}
.hero-blob{position:absolute;border-radius:50%;background:rgba(255,255,255,.12);z-index:-1;animation:heroFloat 7s ease-in-out infinite}
.hero-blob.b1{width:90px;height:90px;top:20px;right:26%}
.hero-blob.b2{width:54px;height:54px;bottom:30px;right:12%;animation-duration:9s}
.dash-hero-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;position:relative}
.hero-greeting{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.82)}
.hero-title{font-family:'Poppins',sans-serif;font-size:30px;font-weight:800;color:#fff;line-height:1.15;margin:6px 0 4px;letter-spacing:-.02em}
.hero-date{font-size:13px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:7px}
.hero-sub{margin-top:14px;font-size:13.5px;color:rgba(255,255,255,.9);max-width:460px;line-height:1.5}
.hero-chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.hero-chip{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(6px);border-radius:14px;padding:8px 14px;color:#fff;display:flex;flex-direction:column;min-width:78px}
.hero-chip b{font-size:18px;font-weight:800;line-height:1}
.hero-chip span{font-size:10.5px;opacity:.85;margin-top:3px;letter-spacing:.03em}
.hero-illustration{font-size:96px;line-height:1;filter:drop-shadow(0 14px 30px rgba(0,0,0,.35));animation:heroFloat 5s ease-in-out infinite}
@keyframes heroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

/* ---------- Section titles ---------- */
.dash-section{margin-bottom:26px}
.dash-section-title{display:flex;align-items:center;gap:10px;font-family:'Poppins',sans-serif;font-size:17px;font-weight:700;margin-bottom:16px;letter-spacing:-.01em}
.dash-section-title .st-ico{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--grad-primary);color:#fff;box-shadow:0 8px 18px -8px var(--ring)}
.dash-section-title .st-count{font-size:12px;font-weight:500;color:var(--muted);margin-left:auto}

/* ---------- Stat cards ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px}
.stat-card{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--border-soft);border-radius:20px;padding:20px;box-shadow:var(--shadow-md);transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s;cursor:default}
.stat-card::after{content:'';position:absolute;inset:0;border-radius:20px;padding:1px;background:var(--sc-grad,var(--grad-primary));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.35;transition:opacity .3s;pointer-events:none}
.stat-card:hover{transform:translateY(-6px)}
.stat-card:hover::after{opacity:.9}
.stat-card:hover{box-shadow:0 26px 48px -22px var(--sc-glow,rgba(99,102,241,.6))}
.stat-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.stat-ico{width:50px;height:50px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:23px;background:var(--sc-grad,var(--grad-primary));color:#fff;box-shadow:0 10px 22px -8px var(--sc-glow,rgba(99,102,241,.6));transition:transform .35s}
.stat-card:hover .stat-ico{transform:rotate(-8deg) scale(1.06)}
.stat-trend{font-size:11px;font-weight:600;padding:4px 8px;border-radius:8px;background:rgba(16,185,129,.14);color:#10b981;display:inline-flex;align-items:center;gap:3px}
.stat-value{font-family:'Poppins',sans-serif;font-size:32px;font-weight:800;line-height:1;letter-spacing:-.02em;color:var(--text)}
.stat-label{font-size:12.5px;color:var(--muted);margin-top:6px;font-weight:500}

/* ---------- Quick actions ---------- */
.qa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px}
.qa-btn{position:relative;overflow:hidden;border:none;cursor:pointer;font-family:'Poppins',sans-serif;border-radius:18px;padding:20px 14px;color:#fff;background:var(--qa-grad,var(--grad-primary));display:flex;flex-direction:column;align-items:center;gap:10px;font-size:13px;font-weight:600;box-shadow:0 14px 30px -16px var(--qa-glow,rgba(99,102,241,.7));transition:transform .25s,box-shadow .25s;text-align:center}
.qa-btn:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 22px 40px -16px var(--qa-glow,rgba(99,102,241,.85));filter:brightness(1.05)}
.qa-btn:active{transform:translateY(-1px) scale(.99)}
.qa-btn .qa-ico{font-size:26px;transition:transform .3s}
.qa-btn:hover .qa-ico{transform:scale(1.15) rotate(6deg)}
.qa-btn .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.5);transform:scale(0);animation:ripple .6s linear;pointer-events:none}
@keyframes ripple{to{transform:scale(4);opacity:0}}

/* ---------- Charts ---------- */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
.chart-card{background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--border-soft);border-radius:20px;padding:20px;box-shadow:var(--shadow-md)}
.chart-card h4{font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px}
.chart-card .chart-sub{font-size:11.5px;color:var(--muted);margin-bottom:14px}
.chart-canvas-wrap{position:relative;height:230px}

/* ---------- Activity timeline / recent notes ---------- */
.dash-columns{display:grid;grid-template-columns:1.4fr 1fr;gap:18px}
@media(max-width:900px){.dash-columns{grid-template-columns:1fr}}
.panel-card{background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--border-soft);border-radius:20px;padding:20px;box-shadow:var(--shadow-md)}
.timeline{position:relative;padding-left:8px}
.tl-item{position:relative;display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border-soft);opacity:0;animation:tlIn .5s forwards}
.tl-item:last-child{border-bottom:none}
.tl-icon{width:40px;height:40px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:19px;background:rgba(99,102,241,.14);border:1px solid var(--border-soft)}
.tl-body{flex:1;min-width:0}
.tl-title{font-size:13.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-meta{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-serial{font-size:11px;font-weight:700;color:var(--primary);background:rgba(99,102,241,.12);border-radius:7px;padding:2px 8px;align-self:center}
@keyframes tlIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}

/* ---------- Announcement card ---------- */
.announce{display:flex;gap:14px;align-items:flex-start;padding:16px;border-radius:16px;background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(6,182,212,.08));border:1px solid var(--border-soft);margin-bottom:14px}
.announce .an-ico{font-size:22px}
.announce b{font-family:'Poppins',sans-serif;font-size:13.5px}
.announce p{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5}

/* ---------- Dashboard folder grid tweak ---------- */
.home-view .folder-card{animation:fadeIn .4s both}

/* ---------- Entrance animations for dashboard blocks ---------- */
.dash-reveal{opacity:0;transform:translateY(18px);animation:dashUp .55s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes dashUp{to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  .dash-hero{padding:24px 20px;border-radius:22px}
  .hero-title{font-size:23px}
  .hero-illustration{font-size:64px}
  .stat-value{font-size:26px}
  .chart-canvas-wrap{height:210px}
}

/* ============================================================
   COLORFUL HOME FOLDER CARDS
   Each folder gets its own colour accent (tinted icon tile +
   matching hover glow), driven by the --folder-color variable.
   ============================================================ */
.home-view .folder-card{padding:22px 16px 18px;display:flex;flex-direction:column;align-items:center}
.home-view .folder-card .folder-icon{width:60px;height:60px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:30px;border-radius:17px;background:color-mix(in srgb,var(--folder-color,var(--primary)) 20%,var(--surface));border:1px solid color-mix(in srgb,var(--folder-color,var(--primary)) 42%,transparent);box-shadow:0 10px 22px -12px var(--folder-color,var(--primary));transition:transform .3s cubic-bezier(.2,.8,.2,1)}
.home-view .folder-card:hover .folder-icon{transform:scale(1.1) rotate(-7deg)}
.home-view .folder-card:hover{box-shadow:0 26px 46px -22px color-mix(in srgb,var(--folder-color,var(--primary)) 75%,transparent)}
.home-view .folder-card .folder-name{font-size:13.5px;font-weight:600}
.home-view .folder-card .folder-count{display:inline-block;margin-top:6px;padding:3px 11px;border-radius:10px;font-size:11px;font-weight:600;color:var(--text);background:color-mix(in srgb,var(--folder-color,var(--primary)) 16%,var(--surface));border:1px solid color-mix(in srgb,var(--folder-color,var(--primary)) 30%,transparent)}

/* ============================================================
   ENHANCED FOLDER VIEW (inside a folder)
   ============================================================ */
.folder-view{font-family:'Poppins','Inter',sans-serif;animation:fadeIn .3s}
.folder-view>.back-btn{margin-bottom:14px}

/* Coloured folder hero banner (colour comes from the folder) */
.folder-hero{position:relative;overflow:hidden;border-radius:22px;padding:24px 26px;margin-bottom:22px;color:#fff;background:linear-gradient(120deg,var(--fh-color,#6366f1) 0%,color-mix(in srgb,var(--fh-color,#6366f1) 55%,#111827) 100%);box-shadow:0 26px 54px -28px var(--fh-color,#6366f1)}
.folder-hero::after{content:'';position:absolute;width:230px;height:230px;border-radius:50%;background:rgba(255,255,255,.13);top:-100px;right:-40px;filter:blur(2px)}
.folder-hero::before{content:'';position:absolute;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.1);bottom:-80px;left:12%}
.fh-inner{position:relative;z-index:1;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.fh-icon{width:66px;height:66px;border-radius:18px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:34px;backdrop-filter:blur(6px);flex-shrink:0;box-shadow:0 8px 20px rgba(0,0,0,.2)}
.fh-name{font-family:'Poppins',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.fh-desc{font-size:12.5px;opacity:.92;margin-top:4px;max-width:420px}
.fh-stats{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto}
.fh-stat{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.24);border-radius:13px;padding:9px 15px;text-align:center;backdrop-filter:blur(6px);min-width:62px}
.fh-stat b{display:block;font-family:'Poppins',sans-serif;font-size:19px;font-weight:800;line-height:1}
.fh-stat span{font-size:10px;opacity:.88;letter-spacing:.03em}
@media(max-width:640px){.fh-stats{margin-left:0;width:100%}.fh-name{font-size:20px}.folder-hero{padding:20px}}

/* Premium file rows */
.folder-view .file-list{gap:10px}
.folder-view .file-row{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--border-soft);border-radius:14px;padding:12px 16px 12px 18px;box-shadow:var(--shadow-md);transition:transform .22s,box-shadow .22s,border-color .22s;animation:dashUp .4s both}
.folder-view .file-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--row-accent,var(--primary));border-radius:0 3px 3px 0}
.folder-view .file-row:hover{transform:translateX(5px);border-color:var(--row-accent,var(--primary));box-shadow:0 16px 32px -18px color-mix(in srgb,var(--row-accent,var(--primary)) 70%,rgba(0,0,0,.6))}
.folder-view .file-row-icon{font-size:26px}
.file-serial{min-width:30px;height:30px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:800;color:#fff;background:var(--grad-primary);flex-shrink:0;box-shadow:0 6px 14px -6px rgba(99,102,241,.7)}
.folder-view .type-badge.badge-pdf{background:var(--grad-danger);color:#fff}
.folder-view .type-badge.badge-html{background:var(--grad-success);color:#fff}
.folder-view .file-admin-actions button:hover{border-color:var(--primary);color:var(--primary);transform:translateY(-2px)}

/* Prettier drop zone */
.folder-view .drop-zone{margin-top:18px;border:2px dashed color-mix(in srgb,var(--primary) 40%,var(--border));border-radius:18px;background:linear-gradient(180deg,color-mix(in srgb,var(--primary) 7%,transparent),transparent);transition:all .25s}
.folder-view .drop-zone:hover,.folder-view .drop-zone.dragover{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 12%,transparent);transform:translateY(-2px)}

/* ============================================================
   SHARED PREMIUM PAGE HERO (settings / upload / visibility)
   ============================================================ */
.settings-panel,.upload-panel{font-family:'Poppins','Inter',sans-serif}
.settings-panel>.back-btn,.upload-panel>.back-btn{margin-bottom:14px}
.page-hero{position:relative;overflow:hidden;border-radius:22px;padding:22px 26px;margin-bottom:22px;color:#fff;display:flex;align-items:center;gap:18px;background:linear-gradient(120deg,var(--ph-color,#6366f1) 0%,color-mix(in srgb,var(--ph-color,#6366f1) 55%,#111827) 100%);box-shadow:0 26px 54px -28px var(--ph-color,#6366f1)}
.page-hero::after{content:'';position:absolute;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.13);top:-100px;right:-40px}
.page-hero .ph-icon{width:60px;height:60px;border-radius:17px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;backdrop-filter:blur(6px);position:relative;z-index:1}
.page-hero .ph-title{font-family:'Poppins',sans-serif;font-size:23px;font-weight:800;letter-spacing:-.02em;line-height:1.1;position:relative;z-index:1}
.page-hero .ph-sub{font-size:12.5px;opacity:.92;margin-top:3px;position:relative;z-index:1}
.page-hero .ph-badge{margin-left:auto;position:relative;z-index:1;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.26);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;backdrop-filter:blur(6px)}

/* ---------- Settings sections ---------- */
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;align-items:start}
.settings-panel .settings-section{padding:22px;border-radius:18px;transition:transform .25s,box-shadow .25s;animation:dashUp .45s both}
.settings-panel .settings-section:hover{transform:translateY(-3px);box-shadow:0 22px 44px -22px rgba(0,0,0,.6)}
.settings-panel .settings-section h3{font-family:'Poppins',sans-serif;display:flex;align-items:center;gap:9px;font-size:15px;color:var(--text)}
.settings-panel .settings-section h3::before{content:'';width:4px;height:18px;border-radius:3px;background:var(--grad-primary)}
.settings-panel .form-group label{font-weight:500}
.settings-panel .form-group input,.settings-panel .form-group textarea{border-radius:12px;padding:11px 14px;transition:border-color .2s,box-shadow .2s}
.status-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px}
.status-pill.ok{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.status-pill.warn{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.settings-section.danger{border-color:rgba(239,68,68,.35)!important}
.settings-section.danger h3::before{background:var(--grad-danger)}

/* ---------- Upload drop zone (big premium) ---------- */
.upload-panel .drop-zone{border:2px dashed color-mix(in srgb,var(--primary) 40%,var(--border));border-radius:24px;padding:52px 32px;background:linear-gradient(180deg,color-mix(in srgb,var(--primary) 8%,transparent),transparent);transition:all .3s}
.upload-panel .drop-zone:hover,.upload-panel .drop-zone.dragover{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 13%,transparent);transform:translateY(-3px)}
.upload-hero-ico{width:88px;height:88px;margin:0 auto 18px;border-radius:26px;display:flex;align-items:center;justify-content:center;font-size:42px;background:var(--grad-primary);color:#fff;box-shadow:0 18px 40px -16px rgba(99,102,241,.7);animation:heroFloat 4s ease-in-out infinite}
.upload-panel .drop-zone h3{font-family:'Poppins',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px}
.upload-panel .drop-zone p{color:var(--muted);font-size:13px}
.accept-chip{display:inline-flex;align-items:center;gap:5px;margin:14px 5px 0;padding:5px 12px;border-radius:20px;font-size:11.5px;font-weight:600;background:color-mix(in srgb,var(--primary) 14%,transparent);border:1px solid color-mix(in srgb,var(--primary) 30%,transparent);color:var(--text)}

/* ---------- Upload progress ---------- */
.upload-panel .upload-progress{margin-top:20px;display:flex;flex-direction:column;gap:10px}
.upload-panel .upload-item{padding:14px 16px;border-radius:14px;background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--border-soft);box-shadow:var(--shadow-md);gap:14px;animation:dashUp .4s both}
.upload-panel .upload-item .status-icon{font-size:18px;width:28px}
.upload-panel .upload-item .name{font-size:13.5px;font-weight:500}
.upload-panel .upload-item .prog-bar{width:130px;height:8px;background:var(--border);border-radius:6px}
.upload-panel .upload-item .prog-fill{background:var(--grad-primary);border-radius:6px;box-shadow:0 0 10px rgba(99,102,241,.5)}

/* ---------- Visibility toggle rows ---------- */
.vis-summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.vis-stat{flex:1;min-width:120px;background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--border-soft);border-radius:16px;padding:16px;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:12px}
.vis-stat .vs-ico{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
.vis-stat b{font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;line-height:1}
.vis-stat span{font-size:11.5px;color:var(--muted)}
.settings-panel .toggle-row{padding:13px 16px;border-radius:13px;background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--border-soft);box-shadow:var(--shadow-md);margin-bottom:9px;transition:transform .2s,border-color .2s;animation:dashUp .35s both}
.settings-panel .toggle-row:hover{transform:translateX(4px);border-color:var(--primary)}
.settings-panel .toggle-row span{font-size:13.5px;font-weight:500}
.settings-panel .toggle-switch{width:44px;height:24px}
.settings-panel .toggle-switch input:checked+.toggle-slider{background:var(--grad-success)}
.settings-panel .toggle-slider::before{height:18px;width:18px}
.settings-panel .toggle-switch input:checked+.toggle-slider::before{transform:translateX(20px)}
@media(max-width:640px){.page-hero{padding:20px}.page-hero .ph-title{font-size:19px}.page-hero .ph-badge{display:none}.upload-panel .drop-zone{padding:38px 20px}}

/* ============================================================
   NOTE STUDIO — built-in note maker (multi-page A4 editor)
   Rich text + handwriting canvas + templates + image insert.
   ============================================================ */
.note-studio{font-family:'Poppins','Inter',sans-serif;animation:fadeIn .3s}
.note-studio>.back-btn{margin-bottom:14px}
.ns-titlebar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.ns-title-input{flex:1;min-width:220px;background:rgba(0,0,0,.25);border:1px solid var(--border-soft);border-radius:12px;padding:12px 16px;color:var(--text);font-size:18px;font-weight:700;font-family:'Poppins',sans-serif}
.ns-title-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--ring)}
.ns-folder-select{background:rgba(0,0,0,.25);border:1px solid var(--border-soft);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;font-family:inherit;max-width:230px}

<body>
<div id="app"></div>
<div id="toast-container"></div>
<script>
// ==================== CONFIG ====================
const REPO_OWNER = 'purendar950';
const REPO_NAME = 'Hand-written-notes-sample-';
const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;
const CONFIG_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/config.json`;
const TELEGRAM_LINK = 'https://t.me/Exam_Zen_StudySync';
const EXCLUDED_FILES = ['index.html', 'manager.html', 'config.json'];
const FOLDER_COLORS = ['#6366f1','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#14b8a6','#f97316','#3b82f6','#a855f7','#eab308','#22d3ee','#84cc16'];

// Returns a folder's colour, auto-assigning a distinct palette colour when
// the folder has none stored yet (so every folder looks colourful).
function folderColor(folder, idx) {
  if (folder && folder.color) return folder.color;
  return FOLDER_COLORS[(idx || 0) % FOLDER_COLORS.length];
}

// ==================== PATH HELPERS ====================
// Files now live in REAL repo folders, so every file is identified by its full
// repo-relative path (e.g. "blitz-series/Lecture 1.PDF"). Its folder is the
// directory portion of that path.
function baseName(p) { return p.split('/').pop(); }
function dirName(p) { const i = p.lastIndexOf('/'); return i < 0 ? '' : p.slice(0, i); }
// Turn a folder name into a URL/filesystem-safe slug used as its real folder name.
function slugify(name) {
  return String(name).toLowerCase().trim()
    .replace(/[^\w\s-]/g, '').replace(/[\s_]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
}
// Encode a path for use in the GitHub Contents API URL (keep "/" separators).
function encodePath(p) { return p.split('/').map(encodeURIComponent).join('/'); }
// Skip app files, any dot-file/dir segment (.github, .gitkeep...), and markers.
function isListablePath(p) {
  if (EXCLUDED_FILES.includes(p)) return false;
  if (baseName(p) === '.gitkeep') return false;
  return !p.split('/').some(seg => seg.startsWith('.'));
}
function folderById(id) { return folders.find(f => f.id === id); }
function folderPathById(id) { const f = folderById(id); return f ? f.path : null; }
// Build a unique leaf slug + full path for a new folder (chaining parent path).
function buildFolderPath(name, parentId) {
  const used = new Set(folders.map(f => f.path));
  let base = slugify(name) || ('folder-' + Date.now());
  const prefix = parentId ? (folderPathById(parentId) + '/') : '';
  let slug = base, i = 2;
  while (used.has(prefix + slug)) { slug = base + '-' + i; i++; }
  return prefix + slug;
}

// ==================== STATE ====================
let folders = [];
let hiddenFiles = [];
let displayNames = {};
let settings = { siteName: 'Parmar Railway Notes', siteSubtitle: 'Hand-Written Notes Library', telegramLink: TELEGRAM_LINK };
let allFiles = [];
let currentView = 'home'; // home, folder, settings, upload, visibility
let currentFolder = null;
let selectedFiles = new Set();
let configSha = null;
let publishStatus = '';
let uploadQueue = [];
let fileOrder = {};

// ==================== INIT ====================
async function init() {
  applyStoredTheme();
  await loadState();
  await loadFiles();
  await fetchTrafficStats();
  render();
}

async function loadState() {
  const token = localStorage.getItem('mgr_github_token');

  // 1) Authenticated Contents API — immediately consistent (no raw CDN lag).
  //    This is what makes a move/hide survive a refresh. It also captures the
  //    current SHA so the next publish can't fail with a 409 conflict.
  if (token) {
    try {
      const res = await fetch(API_URL + 'config.json?t=' + Date.now(), {
        headers: { 'Authorization': `token ${token}` }, cache: 'no-store'
      });
      if (res.ok) {
        const meta = await res.json();
        configSha = meta.sha;
        const json = decodeURIComponent(escape(atob((meta.content || '').replace(/\n/g, ''))));
        applyConfig(JSON.parse(json));
        saveLocal();
        return;
      }
    } catch(e) { console.error('API config load failed, trying raw CDN:', e); }
  }

  // 2) Public raw CDN fallback (may lag a few minutes behind a fresh write).
  try {
    const res = await fetch(CONFIG_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (res.ok) {
      applyConfig(await res.json());
      saveLocal();
      return;
    }
  } catch(e) { console.error('Config load error, using offline fallback:', e); }

  // 3) Network failed — fall back to last known state from localStorage.
  const localFolders = localStorage.getItem('mgr_folders');
  if (localFolders) {
    folders = JSON.parse(localFolders);
    hiddenFiles = JSON.parse(localStorage.getItem('mgr_hidden') || '[]');
    displayNames = JSON.parse(localStorage.getItem('mgr_displayNames') || '{}');
    fileOrder = JSON.parse(localStorage.getItem('mgr_fileOrder') || '{}');
    const s = JSON.parse(localStorage.getItem('mgr_settings') || '{}');
    if (s.siteName) settings.siteName = s.siteName;
    if (s.siteSubtitle) settings.siteSubtitle = s.siteSubtitle;
    if (s.telegramLink) settings.telegramLink = s.telegramLink;
  }
}

function applyConfig(data) {
  folders = data.folders || [];
  hiddenFiles = data.hiddenFiles || [];
  displayNames = data.displayNames || {};
  fileOrder = data.fileOrder || {};
  if (data.siteName) settings.siteName = data.siteName;
  if (data.siteSubtitle) settings.siteSubtitle = data.siteSubtitle;
  if (data.telegramLink) settings.telegramLink = data.telegramLink;
}

async function loadFiles() {
  // 1) Live GitHub tree via the Git Trees API with ?recursive=1 — one call
  //    returns every file in every folder (real subfolders), plus each blob's
  //    SHA (needed to move files server-side) and byte size.
  let treeFiles = [];
  try {
    const token = localStorage.getItem('mgr_github_token');
    const headers = token ? { 'Authorization': `token ${token}` } : {};
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees/main?recursive=1&t=` + Date.now(), { headers, cache: 'no-store' });
    if (res.ok) {
      const data = await res.json();
      treeFiles = (data.tree || [])
        .filter(e => e.type === 'blob' && isListablePath(e.path))
        .map(e => ({ name: baseName(e.path), path: e.path, size: e.size || 0, type: 'file', sha: e.sha }));
    }
  } catch(e) { console.error('Files load error:', e); }

  // 2) Supplement with files the published config already knows about (display
  //    names, serial order). GitHub's tree listing is eventually consistent and
  //    can lag a few seconds behind a fresh commit — without this merge a
  //    just-uploaded file would vanish from the manager after a refresh until
  //    the listing catches up.
  const fileMap = {};
  treeFiles.forEach(f => { fileMap[f.path] = f; });
  const knownFromConfig = new Set([
    ...Object.keys(displayNames || {}),
    ...Object.keys(fileOrder || {})
  ]);
  knownFromConfig.forEach(p => {
    if (!fileMap[p] && isListablePath(p)) {
      fileMap[p] = { name: baseName(p), path: p, size: 0, type: 'file' };
    }
  });
  allFiles = Object.values(fileMap);
}

// ==================== PERSISTENCE ====================
function saveLocal() {
  localStorage.setItem('mgr_folders', JSON.stringify(folders));
  localStorage.setItem('mgr_hidden', JSON.stringify(hiddenFiles));
  localStorage.setItem('mgr_displayNames', JSON.stringify(displayNames));
  localStorage.setItem('mgr_fileOrder', JSON.stringify(fileOrder));
  localStorage.setItem('mgr_settings', JSON.stringify(settings));
}

function saveAndPublish() {
  saveLocal();
  doPublish();
}

function setStatus(msg) {
  publishStatus = msg;
  const el = document.getElementById('publish-status');
  if (el) {
    el.textContent = msg;
    el.className = 'publish-status' + (msg.includes('✅') ? ' ok' : msg.includes('❌') || msg.includes('⚠️') ? ' err' : '');
  }
}

async function doPublish() {
  const token = localStorage.getItem('mgr_github_token');
  if (!token) { setStatus('⚠️ No token'); return; }
  setStatus('⏳ Publishing...');
  try {
    const configData = {
      folders: folders.filter(f => f.id !== 'root' && f.id !== '__unassigned__'),
      displayNames, hiddenFiles, fileOrder,
      telegramLink: settings.telegramLink || TELEGRAM_LINK,
      siteName: settings.siteName || 'Parmar Railway Notes',
      siteSubtitle: settings.siteSubtitle || 'Hand-Written Notes Library',
      lastUpdated: new Date().toISOString().split('T')[0]
    };
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(configData, null, 2))));
    // Always fetch the freshest SHA right before writing (cache-busted) so a
    // stale cached SHA can't cause a 409 conflict, and retry once if it does.
    const fetchSha = async () => {
      try {
        const shaRes = await fetch(API_URL + 'config.json?t=' + Date.now(), {
          headers: { 'Authorization': `token ${token}` }, cache: 'no-store'
        });
        if (shaRes.ok) { const d = await shaRes.json(); return d.sha; }
      } catch(e) { console.error('SHA fetch failed:', e); }
      return null;
    };
    let sha = await fetchSha();
    for (let attempt = 0; attempt < 2; attempt++) {
      const body = { message: 'Update config from manager', content, branch: 'main' };
      if (sha) body.sha = sha;
      const res = await fetch(API_URL + 'config.json', {
        method: 'PUT',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) { const d = await res.json(); configSha = d.content.sha; setStatus('✅ Published'); return; }
      // 409/422 = SHA conflict (config changed elsewhere). Re-fetch and retry once.
      if (res.status === 409 || res.status === 422) { sha = await fetchSha(); continue; }
      const err = await res.json().catch(() => ({}));
      setStatus('❌ Failed: ' + (err.message || res.status));
      console.error(err);
      return;
    }
    setStatus('❌ Failed (conflict — try again)');
  } catch(e) { setStatus('❌ Error'); console.error(e); }
}

// ==================== GIT DATA API (move/rename files physically) ====================
// Move files inside the repo in ONE atomic commit without re-uploading their
// contents. We build a new tree from the current one, pointing the new paths at
// the SAME blob SHAs and deleting the old paths (sha:null), then commit it and
// advance the branch ref. This is size-independent (works for big PDFs) because
// no file bytes are transferred — only tree metadata.
// `moves` = [{ from, to, sha }] (sha = existing blob SHA of the file at `from`).
// `deletes` = [ path, ... ] (optional extra paths to remove, e.g. .gitkeep).
async function gitCommitMoves(moves, message, deletes) {
  const token = localStorage.getItem('mgr_github_token');
  if (!token) { setStatus('⚠️ No token'); return false; }
  const base = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`;
  const H = { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' };
  try {
    const refRes = await fetch(`${base}/git/ref/heads/main?t=` + Date.now(), { headers: H, cache: 'no-store' });
    if (!refRes.ok) throw new Error('ref ' + refRes.status);
    const commitSha = (await refRes.json()).object.sha;
    const commitRes = await fetch(`${base}/git/commits/${commitSha}`, { headers: H });
    const baseTree = (await commitRes.json()).tree.sha;

    const tree = [];
    for (const m of (moves || [])) {
      tree.push({ path: m.to, mode: '100644', type: 'blob', sha: m.sha });
      if (m.from !== m.to) tree.push({ path: m.from, mode: '100644', type: 'blob', sha: null });
    }
    for (const d of (deletes || [])) tree.push({ path: d, mode: '100644', type: 'blob', sha: null });
    if (tree.length === 0) return true;

    const treeRes = await fetch(`${base}/git/trees`, { method: 'POST', headers: H, body: JSON.stringify({ base_tree: baseTree, tree }) });
    if (!treeRes.ok) throw new Error('tree ' + treeRes.status);
    const newTree = (await treeRes.json()).sha;
    const newCommitRes = await fetch(`${base}/git/commits`, { method: 'POST', headers: H, body: JSON.stringify({ message: message || 'Move files', tree: newTree, parents: [commitSha] }) });
    if (!newCommitRes.ok) throw new Error('commit ' + newCommitRes.status);
    const newCommit = (await newCommitRes.json()).sha;
    const patchRes = await fetch(`${base}/git/refs/heads/main`, { method: 'PATCH', headers: H, body: JSON.stringify({ sha: newCommit }) });
    if (!patchRes.ok) throw new Error('ref-update ' + patchRes.status);
    return true;
  } catch(e) { console.error('gitCommitMoves failed:', e); setStatus('❌ Move failed: ' + e.message); return false; }
}

// Recompute a file's target path when moving it into a folder id. '__unassigned__'
// (or an unknown id) means the repo root, so the file keeps just its base name.
function pathForFolder(folderId, fileBaseName) {
  const fp = folderPathById(folderId);
  return (fp ? fp + '/' : '') + fileBaseName;
}

// Re-key config maps (displayNames, fileOrder, hiddenFiles) when a file's path
// changes, so serial numbers / display names / hidden state follow the file.
function remapConfigKey(oldPath, newPath) {
  if (oldPath === newPath) return;
  if (displayNames[oldPath] !== undefined) { displayNames[newPath] = displayNames[oldPath]; delete displayNames[oldPath]; }
  if (fileOrder[oldPath] !== undefined) { fileOrder[newPath] = fileOrder[oldPath]; delete fileOrder[oldPath]; }
  const hi = hiddenFiles.indexOf(oldPath);
  if (hi >= 0) hiddenFiles[hi] = newPath;
}

// Perform a set of moves: commit them physically, update in-memory file paths
// and config keys, then publish the new config. `plan` = [{ file, to }] where
// `file` is an allFiles entry and `to` is the new full path.
async function performMoves(plan, message) {
  const doable = plan.filter(p => p.file && p.file.sha && p.file.path !== p.to);
  if (doable.length === 0) { toast('Nothing to move', 'error'); return false; }
  setStatus('⏳ Moving...');
  const ok = await gitCommitMoves(doable.map(p => ({ from: p.file.path, to: p.to, sha: p.file.sha })), message);
  if (!ok) { toast('Move failed', 'error'); return false; }
  doable.forEach(p => { remapConfigKey(p.file.path, p.to); p.file.path = p.to; p.file.name = baseName(p.to); });
  saveAndPublish();
  return true;
}

function getFileIcon(name) {
  const n = name.toLowerCase();
  if (n.includes('music')) return '🎵';
  if (n.includes('festival')) return '🎉';
  if (n.includes('culture') || n.includes('architecture')) return '🏛️';
  if (n.includes('book') || n.includes('author')) return '📚';
  if (n.includes('current') || n.includes('affairs') || n.includes('gk')) return '📰';
  if (n.endsWith('.pdf')) return '📕';
  return '📄';
}

function getFileType(name) {
  const n = name.toLowerCase();
  if (n.endsWith('.pdf')) return 'PDF';
  if (n.endsWith('.html') || n.endsWith('.htm')) return 'HTML';
  return 'FILE';
}

function getDisplayName(filePath) {
  if (displayNames[filePath]) return displayNames[filePath];
  return baseName(filePath).replace(/\.(html|htm|pdf)$/i, '');
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function getFilesInFolder(folderId) {
  // A file belongs to a folder when its directory equals the folder's path.
  const fp = folderPathById(folderId);
  if (fp == null) return [];
  return allFiles.filter(f => dirName(f.path) === fp);
}

function getUnassignedFiles() {
  // "Other Files": at the repo root, or in a directory with no matching folder.
  const folderPaths = new Set(folders.map(f => f.path));
  return allFiles.filter(f => { const d = dirName(f.path); return d === '' || !folderPaths.has(d); });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Best-effort delete of a single path (used for .gitkeep markers). Ignores 404.
async function deleteRepoPathIfExists(path) {
  const token = localStorage.getItem('mgr_github_token');
  if (!token) return;
  try {
    const r = await fetch(API_URL + encodePath(path), { headers: { 'Authorization': `token ${token}` }, cache: 'no-store' });
    if (!r.ok) return;
    const d = await r.json();
    await fetch(API_URL + encodePath(path), {
      method: 'DELETE',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `Remove ${path}`, sha: d.sha, branch: 'main' })
    });
  } catch(e) { /* best-effort */ }
}

function deleteFolder(folderId) {
  const folder = folderById(folderId);
  if (!folder) return;
  const filesIn = getFilesInFolder(folderId);
  confirm('Delete Folder', `Delete "${escapeHtml(folder.name)}"? Its ${filesIn.length} file(s) will be moved to the repo root (Other Files), not deleted.`, async () => {
    const token = localStorage.getItem('mgr_github_token');
    if (!token) { toast('No GitHub token set', 'error'); return; }
    setStatus('⏳ Deleting folder...');
    // Physically move the folder's files out to the repo root in one commit.
    const movable = filesIn.filter(f => f.sha);
    if (movable.length > 0) {
      const ok = await gitCommitMoves(movable.map(f => ({ from: f.path, to: baseName(f.path), sha: f.sha })), `Delete folder ${folder.path}`);
      if (!ok) { toast('Folder delete failed', 'error'); return; }
    }
    // Remove the .gitkeep marker so the (now empty) folder disappears from the repo.
    await deleteRepoPathIfExists(folder.path + '/.gitkeep');
    // Update in-memory paths + config keys for every file (even config-only ones).
    filesIn.forEach(f => { const to = baseName(f.path); remapConfigKey(f.path, to); f.path = to; f.name = to; });
    folders = folders.filter(f => f.id !== folderId);
    saveAndPublish();
    toast('Folder deleted', 'success');
    if (currentFolder && currentFolder.id === folderId) { currentView = 'home'; currentFolder = null; }
    render();
  });
}

// ==================== FILE SORTING & REORDER ====================
function sortFilesBy(criteria) {
  let files = currentFolder.id === '__unassigned__' ? getUnassignedFiles() : getFilesInFolder(currentFolder.id);
  if (criteria === 'name') files.sort((a,b) => getDisplayName(a.path).localeCompare(getDisplayName(b.path)));
  else if (criteria === 'size') files.sort((a,b) => (b.size||0) - (a.size||0));
  else if (criteria === 'type') files.sort((a,b) => a.name.split('.').pop().localeCompare(b.name.split('.').pop()));
  files.forEach((f, i) => { fileOrder[f.path] = i + 1; });
  saveAndPublish(); toast('Sorted by ' + criteria, 'success'); render();
}
function autoNumberFiles() {
  let files = currentFolder.id === '__unassigned__' ? getUnassignedFiles() : getFilesInFolder(currentFolder.id);
  files.sort((a,b) => { const oA = fileOrder[a.path]||9999; const oB = fileOrder[b.path]||9999; return oA-oB; });
  files.forEach((f, i) => { fileOrder[f.path] = i + 1; });
  saveAndPublish(); toast('Numbered 1 to ' + files.length, 'success'); render();
}
function setSerialNumber(filePath) {
  promptInput('Set Serial #', 'Number for "' + getDisplayName(filePath) + '":', (fileOrder[filePath]||'').toString(), (val) => {
    const num = parseInt(val); if (isNaN(num)) { toast('Enter a number', 'error'); return; }
    fileOrder[filePath] = num; saveAndPublish(); toast('Serial # set to ' + num, 'success'); render();
  });
}
function moveFileUp(idx) {
  let files = currentFolder.id === '__unassigned__' ? getUnassignedFiles() : getFilesInFolder(currentFolder.id);
  files.sort((a,b) => { const oA = fileOrder[a.path]||9999; const oB = fileOrder[b.path]||9999; return oA-oB; });
  if (idx <= 0) return;
  const t = fileOrder[files[idx].path]||idx+1; fileOrder[files[idx].path] = fileOrder[files[idx-1].path]||idx; fileOrder[files[idx-1].path] = t;
  saveAndPublish(); render();
}
function moveFileDown(idx) {
  let files = currentFolder.id === '__unassigned__' ? getUnassignedFiles() : getFilesInFolder(currentFolder.id);
  files.sort((a,b) => { const oA = fileOrder[a.path]||9999; const oB = fileOrder[b.path]||9999; return oA-oB; });
  if (idx >= files.length-1) return;
  const t = fileOrder[files[idx].path]||idx+1; fileOrder[files[idx].path] = fileOrder[files[idx+1].path]||idx+2; fileOrder[files[idx+1].path] = t;
  saveAndPublish(); render();
}

// ==================== UPLOAD ====================
async function uploadFiles(files) {
  const token = localStorage.getItem('mgr_github_token');
  if (!token) { toast('Set GitHub token first', 'error'); return; }
  uploadQueue = Array.from(files).filter(f => /\.(html|htm|pdf)$/i.test(f.name)).map(f => ({ file: f, name: f.name, progress: 0, status: 'pending' }));
  if (uploadQueue.length === 0) { toast('Only .html and .pdf files allowed', 'error'); return; }
  currentView = 'upload';
  render();
  // Next free serial number across all files, so newly uploaded files append to
  // the end and never renumber/disorganise files that already have a serial.
  const existingSerials = Object.values(fileOrder).filter(n => typeof n === 'number' && !isNaN(n));
  let nextSerial = (existingSerials.length ? Math.max(...existingSerials) : 0) + 1;
  // Upload target folder: the folder currently open (into its real path), else
  // the repo root when uploading from the standalone Upload view.
  const uploadFolderId = (currentFolder && currentFolder.id !== '__unassigned__') ? currentFolder.id : null;
  for (const item of uploadQueue) {
    item.status = 'uploading';
    render();
    try {
      const reader = new FileReader();
      const base64 = await new Promise((resolve, reject) => {
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(item.file);
      });
      // Destination path INSIDE the folder (e.g. "blitz-series/Lecture 5.PDF").
      const targetPath = pathForFolder(uploadFolderId, item.name);
      item.path = targetPath;
      // Check if a file already exists at that path (so we update, not error).
      let sha = null;
      const checkRes = await fetch(API_URL + encodePath(targetPath), { headers: { 'Authorization': `token ${token}` } });
      if (checkRes.ok) { const d = await checkRes.json(); sha = d.sha; }
      const body = { message: `Upload ${targetPath}`, content: base64, branch: 'main' };
      if (sha) body.sha = sha;
      item.progress = 50;
      render();
      const res = await fetch(API_URL + encodePath(targetPath), {
        method: 'PUT',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        item.progress = 100;
        item.status = 'done';
        const d = await res.json();
        const existing = allFiles.find(f => f.path === targetPath);
        if (existing) { existing.sha = d.content.sha; existing.size = item.file.size; }
        else { allFiles.push({ name: baseName(targetPath), path: targetPath, size: item.file.size, type: 'file', sha: d.content.sha }); }
        // Give brand-new files the next serial number. Existing files keep
        // their numbers, so the established order is never disturbed.
        if (fileOrder[targetPath] === undefined) {
          fileOrder[targetPath] = nextSerial++;
        }
      } else { item.status = 'error'; item.progress = 0; }
    } catch(e) { item.status = 'error'; item.progress = 0; }
    render();
  }
  saveAndPublish();
  toast('Upload complete', 'success');
}

// ==================== SITE VISIT COUNTER ====================
// Reads the same Abacus counter that index.html increments. Namespace/key MUST
// match index.html. Uses /get/ so opening the admin never inflates the count.
const VIEW_COUNTER_BASE = 'https://abacus.jasoncameron.dev';
const VIEW_COUNTER_NS = 'parmar-railway-notes-purendar950';
const VIEW_COUNTER_KEY = 'site-visits';
let trafficData = { visits: null, error: false };

async function fetchTrafficStats() {
  try {
    const res = await fetch(`${VIEW_COUNTER_BASE}/get/${VIEW_COUNTER_NS}/${VIEW_COUNTER_KEY}`, { cache: 'no-store' });
    if (res.ok) {
      const data = await res.json();
      trafficData.visits = typeof data.value === 'number' ? data.value : 0;
    } else if (res.status === 404) {
      // Counter not created yet (no visits recorded).
      trafficData.visits = 0;
    } else {
      trafficData.error = true;
    }
  } catch (e) {
    trafficData.error = true;
    console.warn('Visit counter fetch failed:', e);
  }
}

function renderTrafficStats() {
  const v = trafficData.visits;
  const display = v != null ? v.toLocaleString() : (trafficData.error ? 'unavailable' : '\u2014');
  return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">

      <span style="font-size:15px;font-weight:600;color:var(--text)">Site Visitors (live)</span>

    <div style="background:var(--card);border-radius:8px;padding:20px;text-align:center">

      <div style="font-size:12px;color:var(--muted);margin-top:6px">Total visits to your live notes site</div>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:10px;text-align:center">
      ${trafficData.error
        ? '\u26A0\uFE0F Counter service unreachable right now \u2014 try again shortly.'
        : 'Counts real visits to the published site (one per visitor session). Updates in real time \u2014 no token needed.'}
    </div>
  </div>`;
}

// Compute real statistics from the current in-memory state (no fabricated data).
function getDashStats() {
  const total = allFiles.length;
  const hidden = allFiles.filter(f => hiddenFiles.includes(f.path)).length;
  const published = total - hidden;
  const pdf = allFiles.filter(f => getFileType(f.name) === 'PDF').length;
  const html = allFiles.filter(f => getFileType(f.name) === 'HTML').length;
  return { total, hidden, published, pdf, html, foldersCount: folders.length, visits: trafficData.visits };
}

// Recent notes proxy: files with the highest serial numbers were added most
// recently (uploads append the next serial), so this surfaces latest additions.
function getRecentNotes(n) {
  const withOrder = allFiles.filter(f => fileOrder[f.path] !== undefined)
    .sort((a, b) => (fileOrder[b.path] || 0) - (fileOrder[a.path] || 0));
  const list = withOrder.length ? withOrder : allFiles.slice();
  return list.slice(0, n);
}

// The folder name that contains a given file path (for activity meta labels).
function folderNameForPath(p) {
  const d = dirName(p);
  if (d === '') return 'Other Files';
  const f = folders.find(x => x.path === d);
  return f ? f.name : (d || 'Other Files');
}

function exportConfig() {
  const configData = {
    folders, displayNames, hiddenFiles, fileOrder,
    telegramLink: settings.telegramLink, siteName: settings.siteName, siteSubtitle: settings.siteSubtitle,
    lastUpdated: new Date().toISOString().split('T')[0]
  };
  const blob = new Blob([JSON.stringify(configData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'config.json';
  a.click();
  toast('Config exported', 'success');
}

function importConfig(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.folders) folders = data.folders;
      if (data.displayNames) displayNames = data.displayNames;
      if (data.fileOrder) fileOrder = data.fileOrder;
      if (data.hiddenFiles) hiddenFiles = data.hiddenFiles;
      if (data.siteName) settings.siteName = data.siteName;
      if (data.siteSubtitle) settings.siteSubtitle = data.siteSubtitle;
      if (data.telegramLink) settings.telegramLink = data.telegramLink;
      saveAndPublish();
      toast('Config imported', 'success');
      render();
    } catch(err) { toast('Invalid JSON file', 'error'); }
  };
  reader.readAsText(file);
}

// Material-style ripple for quick action buttons.
function qaRipple(e) {
  const btn = e.currentTarget;
  const circle = document.createElement('span');
  const d = Math.max(btn.clientWidth, btn.clientHeight);
  const r = btn.getBoundingClientRect();
  circle.className = 'ripple';
  circle.style.width = circle.style.height = d + 'px';
  circle.style.left = (e.clientX - r.left - d / 2) + 'px';
  circle.style.top = (e.clientY - r.top - d / 2) + 'px';
  btn.appendChild(circle);
  setTimeout(() => circle.remove(), 600);
}

// Count-up animation for stat values (respects reduced-motion).
function animateCount(el) {
  const target = parseFloat(el.dataset.count) || 0;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches || target === 0) {
    el.textContent = target.toLocaleString(); return;
  }
  const dur = 1100, start = performance.now();
  (function tick(now) {
    const p = Math.min((now - start) / dur, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.floor(eased * target).toLocaleString();
    if (p < 1) requestAnimationFrame(tick); else el.textContent = target.toLocaleString();
  })(performance.now());
}

let dashCharts = {};
function initHomeDashboard() {
  // Count-up animations
  document.querySelectorAll('.stat-value[data-count]').forEach(animateCount);

  // Charts (gracefully skip if Chart.js hasn't loaded)
  if (typeof Chart === 'undefined') return;
  Object.values(dashCharts).forEach(c => { try { c.destroy(); } catch (e) {} });
  dashCharts = {};

  const cs = getComputedStyle(document.body);
  const textColor = (cs.getPropertyValue('--muted') || '#93a0b8').trim();
  const gridColor = (cs.getPropertyValue('--border-soft') || 'rgba(255,255,255,.07)').trim();
  Chart.defaults.font.family = "'Poppins','Inter',sans-serif";
  Chart.defaults.color = textColor;
  const palette = ['#6366f1', '#8b5cf6', '#06b6d4', '#10b981', '#f59e0b', '#ef4444', '#22d3ee', '#a78bfa', '#34d399', '#fbbf24'];

  // Notes per folder
  const folderData = [...folders].sort((a, b) => (a.order ?? 99) - (b.order ?? 99))
    .map(f => ({ name: f.name, count: getFilesInFolder(f.id).length }));
  const unassignedCount = getUnassignedFiles().length;
  if (unassignedCount > 0) folderData.push({ name: 'Unassigned', count: unassignedCount });

  const barEl = document.getElementById('dashBarChart');
  if (barEl && folderData.length) {
    dashCharts.bar = new Chart(barEl, {
      type: 'bar',
      data: {
        labels: folderData.map(d => d.name),
        datasets: [{ label: 'Notes', data: folderData.map(d => d.count), backgroundColor: folderData.map((_, i) => palette[i % palette.length]), borderRadius: 8, maxBarThickness: 42 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 900, easing: 'easeOutQuart' },
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { autoSkip: false, maxRotation: 40, minRotation: 0, font: { size: 10 } } },
          y: { beginAtZero: true, grid: { color: gridColor }, ticks: { precision: 0 } }
        }
      }
    });
  }

  // File type doughnut
  const st = getDashStats();
  const other = st.total - st.pdf - st.html;
  const doughEl = document.getElementById('dashDoughnutChart');
  if (doughEl) {
    dashCharts.dough = new Chart(doughEl, {
      type: 'doughnut',
      data: {
        labels: ['PDF', 'HTML', ...(other > 0 ? ['Other'] : [])],
        datasets: [{ data: [st.pdf, st.html, ...(other > 0 ? [other] : [])], backgroundColor: ['#ef4444', '#10b981', '#8b5cf6'], borderWidth: 0, hoverOffset: 8 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '62%',
        animation: { animateScale: true, duration: 900 },
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 14, font: { size: 11 } } } }
      }
    });
  }

  // Cumulative growth line/area
  let cumulative = 0;
  const lineData = folderData.map(d => (cumulative += d.count));
  const lineEl = document.getElementById('dashLineChart');
  if (lineEl && folderData.length) {
    const ctx = lineEl.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 230);
    grad.addColorStop(0, 'rgba(99,102,241,.45)');
    grad.addColorStop(1, 'rgba(99,102,241,0)');
    dashCharts.line = new Chart(lineEl, {
      type: 'line',
      data: {
        labels: folderData.map(d => d.name),
        datasets: [{ label: 'Cumulative notes', data: lineData, borderColor: '#6366f1', backgroundColor: grad, fill: true, tension: .4, pointRadius: 4, pointBackgroundColor: '#8b5cf6', pointBorderColor: '#fff', pointBorderWidth: 1.5, borderWidth: 2.5 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 1000, easing: 'easeOutQuart' },
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { autoSkip: false, maxRotation: 40, font: { size: 10 } } },
          y: { beginAtZero: true, grid: { color: gridColor }, ticks: { precision: 0 } }
        }
      }
    });
  }
}

// ==================== NOTE STUDIO (built-in note maker) ====================
// A multi-page A4 editor that produces a self-contained, printable .html note
// and publishes it into a folder using the SAME GitHub token + config flow as
// uploads. Each page carries: a template background, a rich-text layer
// (contenteditable) and a handwriting layer (canvas strokes). Drawings are
// baked into <img> data-URLs when the note is generated.

const NS_PAGE_W = 794;   // A4 width  @96dpi (px)
const NS_PAGE_H = 1123;  // A4 height @96dpi (px)
const NS_DRAFT_KEY = 'mgr_noteStudio_draft';
const NS_PEN_SWATCHES = ['#111827','#ef4444','#2563eb','#059669','#d97706','#7c3aed','#db2777','#0891b2'];
const NS_HL_SWATCHES  = ['#fff59d','#a7f3d0','#bfdbfe','#fecaca','#e9d5ff','#fed7aa'];

let noteStudio = null;   // active editor state (null when closed)
let nsDraw = { drawing: false, stroke: null, idx: 0, cv: null };
let nsPointerUpBound = false;

function nsNewPage(template) {
  return { id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,6), template: template || 'ruled', textHTML: '', strokes: [], redo: [] };
}

function nsFreshState(folderId) {
  return {
    title: '',
    folderId: (folderId && folderId !== '__unassigned__') ? folderId : '',
    mode: 'type',
    tool: 'pen',
    penColor: '#111827',
    hlColor: '#fff59d',
    penSize: 3,
    activePage: 0,
    pages: [ nsNewPage('ruled') ]
  };
}

// Open the editor. Restores an autosaved draft if one exists (and the user
// confirms); otherwise starts fresh (optionally pre-selecting a folder).
function openNoteStudio(folderId) {
  const draft = localStorage.getItem(NS_DRAFT_KEY);
  if (draft) {
    try {
      const d = JSON.parse(draft);
      const hasContent = d && d.pages && d.pages.some(p => (p.textHTML && p.textHTML.trim()) || (p.strokes && p.strokes.length));
      if (hasContent && window.confirm('Resume your unsaved draft note? Click Cancel to start a new blank note.')) {
        noteStudio = d;
        if (folderId && folderId !== '__unassigned__') noteStudio.folderId = folderId;
      } else {
        localStorage.removeItem(NS_DRAFT_KEY);
        noteStudio = nsFreshState(folderId);
      }
    } catch(e) { noteStudio = nsFreshState(folderId); }
  } else {
    noteStudio = nsFreshState(folderId);
  }
  currentView = 'notestudio';
  render();
}

function nsExit() {
  nsSyncText();
  const hasContent = noteStudio && noteStudio.pages.some(p => (p.textHTML && p.textHTML.trim()) || (p.strokes && p.strokes.length));
  if (hasContent) nsSaveDraft(); // keep the draft so nothing is lost
  noteStudio = null;
  goHome();
}
