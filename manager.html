        <button class="ns-btn ${noteStudio.tool==='highlighter'?'active':''}" onclick="nsSetTool('highlighter')" title="Highlighter">🖍️</button>
        <button class="ns-btn ${noteStudio.tool==='eraser'?'active':''}" onclick="nsSetTool('eraser')" title="Eraser">🧽</button>
        <span class="ns-swatches" id="ns-pen-swatches">${penSw}</span>
        <input class="ns-color" type="color" value="${noteStudio.penColor}" onchange="nsPickColor(this.value)" title="Custom colour">
        <span class="ns-tlabel">Size</span>
        <input class="ns-range" type="range" min="1" max="24" value="${noteStudio.penSize}" oninput="noteStudio.penSize=+this.value">
        <button class="ns-btn" onclick="nsUndo()" title="Undo stroke">↶</button>
        <button class="ns-btn" onclick="nsRedo()" title="Redo stroke">↷</button>
        <button class="ns-btn danger" onclick="nsClearDrawing()" title="Clear drawing on this page">✕ Clear</button>
      </div>

      <div class="ns-tgroup">
        <span class="ns-tlabel">Template</span>
        <select class="ns-select" id="ns-template" onchange="nsSetTemplate(this.value)" title="Page template">
          <option value="blank">Blank</option>
          <option value="ruled">Ruled</option>
          <option value="grid">Grid</option>
          <option value="dotted">Dotted</option>
          <option value="cornell">Cornell</option>
        </select>
      </div>
    </div>

    <div class="ns-stage" id="ns-stage"></div>

    <div class="ns-actionbar">
      <button class="btn btn-primary" onclick="nsPublish()">🚀 Publish Note</button>
      <button class="btn" onclick="nsPreview()">👁️ Preview</button>
      <button class="btn btn-danger" onclick="nsDiscard()">🗑️ Discard Draft</button>
      <span class="ns-draft-status" id="ns-draft-status">Draft autosaves as you write</span>
    </div>
  </div>`;
}

// Build the pages into the stage and wire up canvas + text listeners. Called on
// entry and whenever pages are added/removed (NOT on every keystroke, so the
// contenteditable caret and canvas bitmaps survive).
function initNoteStudio() {
  const tplSel = document.getElementById('ns-template');
  if (tplSel && noteStudio.pages[noteStudio.activePage]) tplSel.value = noteStudio.pages[noteStudio.activePage].template;
  const fSel = document.getElementById('ns-folder');
  if (fSel) fSel.value = noteStudio.folderId || '';
  nsRenderPages();
}

function nsRenderPages() {
  const stage = document.getElementById('ns-stage');
  if (!stage) return;
  let html = '';
  noteStudio.pages.forEach((pg, idx) => {
    html += `<div class="ns-page-wrap">
      <span class="ns-page-num">Page ${idx+1} of ${noteStudio.pages.length}</span>
      ${noteStudio.pages.length > 1 ? `<button class="ns-page-del" title="Delete page" onclick="nsDeletePage(${idx})">🗑️</button>` : ''}
      <div class="ns-page tpl-${pg.template} mode-${noteStudio.mode}" data-idx="${idx}">
        <div class="ns-page-text" contenteditable="true" data-idx="${idx}" data-ph="${idx===0?'Start typing your note…':'Continue writing…'}">${pg.textHTML||''}</div>
        <canvas class="ns-page-canvas" data-idx="${idx}" width="${NS_PAGE_W}" height="${NS_PAGE_H}"></canvas>
      </div>
    </div>`;
  });
  html += `<button class="ns-add-page" onclick="nsAddPage()">＋ Add page</button>`;
  stage.innerHTML = html;

  // Wire each page's text + canvas.
  stage.querySelectorAll('.ns-page-text').forEach(div => {
    div.addEventListener('input', () => { const i = +div.dataset.idx; noteStudio.pages[i].textHTML = div.innerHTML; nsScheduleSave(); });
    div.addEventListener('focus', () => { noteStudio.activePage = +div.dataset.idx; const t=document.getElementById('ns-template'); if(t) t.value=noteStudio.pages[noteStudio.activePage].template; });
  });
  stage.querySelectorAll('.ns-page-canvas').forEach(cv => {
    const i = +cv.dataset.idx;
    nsRedrawCanvas(cv, noteStudio.pages[i]);
    nsAttachCanvas(cv, i);
  });
}

// Save all live contenteditable HTML back into state (call before re-rendering
// pages or generating the note).
function nsSyncText() {
  if (!noteStudio) return;
  document.querySelectorAll('.ns-page-text').forEach(div => {
    const i = +div.dataset.idx;
    if (noteStudio.pages[i]) noteStudio.pages[i].textHTML = div.innerHTML;
  });
}

// ---------- Rich text ----------
function nsFormat(cmd, val) { document.execCommand(cmd, false, val || null); const d = nsActiveTextEl(); if (d) { noteStudio.pages[+d.dataset.idx].textHTML = d.innerHTML; nsScheduleSave(); } }
function nsFormatBlock(tag) { if (!tag) return; document.execCommand('formatBlock', false, tag); nsFormat('_noop'); }
function nsHiliteText() { document.execCommand('hiliteColor', false, noteStudio.hlColor); nsFormat('_noop'); }
function nsActiveTextEl() {
  const sel = window.getSelection();
  if (sel && sel.anchorNode) { let n = sel.anchorNode; while (n && n !== document.body) { if (n.classList && n.classList.contains('ns-page-text')) return n; n = n.parentNode; } }
  return document.querySelector('.ns-page-text[data-idx="'+noteStudio.activePage+'"]');
}
function nsInsertImage() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = () => {
    const file = inp.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const el = nsActiveTextEl(); if (el) el.focus();
      document.execCommand('insertHTML', false, `<img src="${reader.result}" style="max-width:100%;border-radius:6px;margin:6px 0">`);
      nsSyncText(); nsScheduleSave();
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

// ---------- Mode / tools ----------
function nsSetMode(m) {
  nsSyncText();
  noteStudio.mode = m;
  render();
}
function nsSetTool(t) { noteStudio.tool = t; document.querySelectorAll('#ns-drawtools .ns-btn').forEach(b=>b.classList.remove('active')); render(); }
function nsPickColor(c) {
  if (noteStudio.tool === 'highlighter') noteStudio.hlColor = c; else { noteStudio.penColor = c; if (noteStudio.tool === 'eraser') noteStudio.tool = 'pen'; }
  render();
}
function nsSetTemplate(tpl) {
  const pg = noteStudio.pages[noteStudio.activePage];
  if (!pg) return;
  pg.template = tpl;
  const pageEl = document.querySelector('.ns-page[data-idx="'+noteStudio.activePage+'"]');
  if (pageEl) pageEl.className = 'ns-page tpl-' + tpl + ' mode-' + noteStudio.mode;
  nsScheduleSave();
}

// ---------- Pages ----------
function nsAddPage() {
  nsSyncText();
  const last = noteStudio.pages[noteStudio.pages.length-1];
  noteStudio.pages.push(nsNewPage(last ? last.template : 'ruled'));
  noteStudio.activePage = noteStudio.pages.length - 1;
  nsRenderPages();
  nsScheduleSave();
  const stage = document.getElementById('ns-stage');
  if (stage) stage.lastElementChild.scrollIntoView({ behavior:'smooth', block:'center' });
}
function nsDeletePage(idx) {
  if (noteStudio.pages.length <= 1) return;
  confirm('Delete Page', 'Delete page ' + (idx+1) + '? Its text and drawing will be removed.', () => {
    nsSyncText();
    noteStudio.pages.splice(idx, 1);
    if (noteStudio.activePage >= noteStudio.pages.length) noteStudio.activePage = noteStudio.pages.length - 1;
    nsRenderPages();
    nsScheduleSave();
  });
}

// ---------- Drawing engine ----------
// A single global pointerup handler commits the in-progress stroke to the page
// it was started on (tracked in nsDraw), so it stays correct no matter how many
// times the pages are re-rendered.
function nsGlobalPointerUp() {
  if (!nsDraw.drawing) return;
  nsDraw.drawing = false;
  const pg = noteStudio && noteStudio.pages[nsDraw.idx];
  if (pg && nsDraw.stroke && nsDraw.stroke.points.length) { pg.strokes.push(nsDraw.stroke); nsScheduleSave(); }
  const cv = nsDraw.cv;
  nsDraw.stroke = null; nsDraw.cv = null;
  if (cv && pg) nsRedrawCanvas(cv, pg);
}
function nsAttachCanvas(cv, idx) {
  const getPos = (e) => {
    const r = cv.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX);
    const cy = (e.touches ? e.touches[0].clientY : e.clientY);
    return { x: (cx - r.left) * (NS_PAGE_W / r.width), y: (cy - r.top) * (NS_PAGE_H / r.height), p: (e.pressure && e.pressure > 0 ? e.pressure : 1) };
  };
  cv.addEventListener('pointerdown', (e) => {
    if (noteStudio.mode !== 'draw') return;
    e.preventDefault();
    noteStudio.activePage = idx;
    nsDraw.drawing = true; nsDraw.idx = idx; nsDraw.cv = cv;
    noteStudio.pages[idx].redo = [];
    nsDraw.stroke = { tool: noteStudio.tool, color: noteStudio.tool==='highlighter'?noteStudio.hlColor:noteStudio.penColor, size: noteStudio.penSize, points: [getPos(e)] };
    try { cv.setPointerCapture(e.pointerId); } catch(_) {}
  });
  cv.addEventListener('pointermove', (e) => {
    if (!nsDraw.drawing || nsDraw.idx !== idx || noteStudio.mode !== 'draw') return;
    e.preventDefault();
    nsDraw.stroke.points.push(getPos(e));
    nsRedrawCanvas(cv, noteStudio.pages[idx], nsDraw.stroke);
  });
  // Bind the global pointerup exactly once.
  if (!nsPointerUpBound) { window.addEventListener('pointerup', nsGlobalPointerUp); window.addEventListener('pointercancel', nsGlobalPointerUp); nsPointerUpBound = true; }
}

// Draw a single stroke onto a 2d context.
function nsPaintStroke(ctx, s) {
  if (!s.points.length) return;
  ctx.save();
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  if (s.tool === 'eraser') { ctx.globalCompositeOperation = 'destination-out'; ctx.strokeStyle = 'rgba(0,0,0,1)'; ctx.lineWidth = s.size * 4; }
  else if (s.tool === 'highlighter') { ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = s.color; ctx.globalAlpha = 0.35; ctx.lineWidth = s.size * 4; }
  else { ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = s.color; ctx.lineWidth = s.size; }
  ctx.beginPath();
  s.points.forEach((pt, i) => { const lw = (s.tool==='pen') ? Math.max(0.6, s.size * pt.p) : ctx.lineWidth; ctx.lineWidth = lw; if (i===0) ctx.moveTo(pt.x, pt.y); else ctx.lineTo(pt.x, pt.y); });
  ctx.stroke();
  ctx.restore();
}
// Repaint a canvas from its committed strokes (+ an optional in-progress one).
function nsRedrawCanvas(cv, pg, live) {
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, NS_PAGE_W, NS_PAGE_H);
  pg.strokes.forEach(s => nsPaintStroke(ctx, s));
  if (live) nsPaintStroke(ctx, live);
}
function nsCurrentCanvas() { return document.querySelector('.ns-page-canvas[data-idx="'+noteStudio.activePage+'"]'); }
function nsUndo() {
  const pg = noteStudio.pages[noteStudio.activePage];
  if (!pg.strokes.length) return;
  pg.redo.push(pg.strokes.pop());
  const cv = nsCurrentCanvas(); if (cv) nsRedrawCanvas(cv, pg);
  nsScheduleSave();
}
function nsRedo() {
  const pg = noteStudio.pages[noteStudio.activePage];
  if (!pg.redo || !pg.redo.length) return;
  pg.strokes.push(pg.redo.pop());
  const cv = nsCurrentCanvas(); if (cv) nsRedrawCanvas(cv, pg);
  nsScheduleSave();
}
function nsClearDrawing() {
  const pg = noteStudio.pages[noteStudio.activePage];
  if (!pg.strokes.length) return;
  confirm('Clear Drawing', 'Erase all handwriting/drawing on this page? (Typed text is kept.)', () => {
    pg.strokes = []; pg.redo = [];
    const cv = nsCurrentCanvas(); if (cv) nsRedrawCanvas(cv, pg);
    nsScheduleSave();
  });
}

// ---------- Draft autosave ----------
let nsSaveTimer = null;
function nsScheduleSave() { clearTimeout(nsSaveTimer); nsSaveTimer = setTimeout(nsSaveDraft, 700); const el = document.getElementById('ns-draft-status'); if (el) el.textContent = 'Saving…'; }
function nsSaveDraft() {
  if (!noteStudio) return;
  nsSyncText();
  try { localStorage.setItem(NS_DRAFT_KEY, JSON.stringify(noteStudio)); const el = document.getElementById('ns-draft-status'); if (el) el.textContent = '✅ Draft saved ' + new Date().toLocaleTimeString(); }
  catch(e) { const el = document.getElementById('ns-draft-status'); if (el) el.textContent = '⚠️ Draft too large to autosave'; }
}
function nsDiscard() {
  confirm('Discard Draft', 'Discard this note and clear the saved draft? This cannot be undone.', () => {
    localStorage.removeItem(NS_DRAFT_KEY);
    noteStudio = null;
    goHome();
  });
}

// ---------- Generate standalone note HTML ----------
function nsBakeDrawing(pg) {
  if (!pg.strokes.length) return '';
  const cv = document.createElement('canvas');
  cv.width = NS_PAGE_W; cv.height = NS_PAGE_H;
  nsRedrawCanvas(cv, pg);
  return cv.toDataURL('image/png');
}
function nsBuildNoteHtml() {
  nsSyncText();

    const img = nsBakeDrawing(pg);

<head>

function nsPreview() {
  const html = nsBuildNoteHtml();
  const w = window.open('', '_blank');
  if (!w) { toast('Allow pop-ups to preview', 'error'); return; }
  w.document.open(); w.document.write(html); w.document.close();
}

// Publish the generated note as a real .html file in the chosen folder, using
// the same GitHub Contents API + config publish flow as uploads.
async function nsPublish() {
  const token = localStorage.getItem('mgr_github_token');
  if (!token) { toast('Set your GitHub token in Settings first', 'error'); return; }
  nsSyncText();
  const title = (noteStudio.title || '').trim();
  if (!title) { toast('Please add a title for your note', 'error'); return; }
  const hasContent = noteStudio.pages.some(p => (p.textHTML && p.textHTML.replace(/<[^>]*>/g,'').trim()) || (p.strokes && p.strokes.length));
  if (!hasContent) { toast('Write or draw something first', 'error'); return; }

  const html = nsBuildNoteHtml();
  const fileName = (slugify(title) || 'note') + '-' + Date.now() + '.html';
  const folderId = noteStudio.folderId || null;
  const targetPath = pathForFolder(folderId, fileName);

  setStatus('⏳ Publishing note...');
  toast('Publishing note…');
  try {
    const content = btoa(unescape(encodeURIComponent(html)));
    const res = await fetch(API_URL + encodePath(targetPath), {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `Create note ${targetPath}`, content, branch: 'main' })
    });
    if (!res.ok) { const err = await res.json().catch(()=>({})); toast('Publish failed: ' + (err.message || res.status), 'error'); setStatus('❌ Failed'); return; }
    const d = await res.json();
    // Register the new file so it shows up immediately (mirrors uploadFiles).
    allFiles.push({ name: fileName, path: targetPath, size: html.length, type: 'file', sha: d.content.sha });
    displayNames[targetPath] = title;
    const existingSerials = Object.values(fileOrder).filter(n => typeof n === 'number' && !isNaN(n));
    fileOrder[targetPath] = (existingSerials.length ? Math.max(...existingSerials) : 0) + 1;
    saveAndPublish();
    localStorage.removeItem(NS_DRAFT_KEY);
    noteStudio = null;
    toast('✅ Note published!', 'success');
    // Jump to the folder it landed in so the user sees it.
    openFolder(folderId || '__unassigned__');
  } catch(e) { toast('Error: ' + e.message, 'error'); setStatus('❌ Error'); console.error(e); }
}

// ==================== ANNOTATOR (open & edit existing files) ====================
// Opens an EXISTING note (PDF or HTML) full-screen and overlays editing tools
// (pen, highlighter, eraser, text) so you can mark it up, then saves an
// annotated COPY back to the repo (never overwrites the original) and/or lets
// you download it. PDFs are rendered with PDF.js and re-baked with pdf-lib;
// HTML notes are shown in an iframe with an overlay ink layer baked on save.

const AN_PEN_SWATCHES = ['#e11d48','#111827','#2563eb','#059669','#d97706','#7c3aed'];
const AN_HL_SWATCHES  = ['#fff176','#a5f3a0','#9fd6ff','#ffb3c1','#e5b3ff'];
let annot = null;                 // active annotator state (null when closed)
let annotDraw = { drawing:false, page:null, stroke:null };
let annotPointerBound = false;

function anTypeOf(path){ const n = path.toLowerCase(); if (n.endsWith('.pdf')) return 'pdf'; if (n.endsWith('.html')||n.endsWith('.htm')) return 'html'; return 'other'; }
function anFileUrl(path){ return 'https://' + REPO_OWNER + '.github.io/' + REPO_NAME + '/' + encodePath(path) + '?v=' + Date.now(); }
function dataURLToUint8(dataURL){ const b = atob(dataURL.split(',')[1]); const u = new Uint8Array(b.length); for (let i=0;i<b.length;i++) u[i]=b.charCodeAt(i); return u; }

function openAnnotator(filePath){
  const type = anTypeOf(filePath);
  if (type === 'other'){ toast('Only PDF and HTML notes can be annotated', 'error'); return; }
  annot = { filePath, type, name: getDisplayName(filePath), mode:'pen', tool:'pen', penColor:'#e11d48', hlColor:'#fff176', size:3, textSize:20, fingerScroll:false, zoom:1, pages:[], pdfSaveBytes:null, htmlHead:'', htmlBody:'', docW:0 };
  anMount();
  if (type === 'pdf') anLoadPdf(); else anLoadHtml();
}

function anClose(){
  const root = document.getElementById('annot-root');
  if (root) root.remove();
  annot = null; annotDraw = { drawing:false, page:null, stroke:null };
  document.body.style.overflow = '';
}

function anMount(){
  document.body.style.overflow = 'hidden';
  const root = document.createElement('div');
  root.className = 'annot-root'; root.id = 'annot-root';
  const badge = annot.type.toUpperCase();
  const penSw = AN_PEN_SWATCHES.map(c => `<span class="an-sw" data-c="${c}" style="background:${c}" onclick="anPickColor('${c}')"></span>`).join('');
  root.innerHTML = `
    <div class="annot-topbar">
      <div class="annot-file"><span class="an-type">${badge}</span><span>${escapeHtml(annot.name)}</span></div>
      <div class="annot-tools">
        <div class="annot-grp">
          <button class="an-btn active" id="an-tool-pen" onclick="anSetTool('pen')" title="Pen (write)">🖊️</button>
          <button class="an-btn" id="an-tool-highlighter" onclick="anSetTool('highlighter')" title="Highlighter">🖍️</button>
          <button class="an-btn" id="an-tool-eraser" onclick="anSetTool('eraser')" title="Eraser">🧽</button>
          <button class="an-btn" id="an-tool-text" onclick="anSetTool('text')" title="Add text (then click on the page)">🆃</button>
          <button class="an-btn" id="an-tool-pan" onclick="anSetTool('pan')" title="Pan / scroll the page">🖐️</button>
          <button class="an-btn" id="an-finger" onclick="anToggleFingerScroll()" title="Finger draws (tap to let finger scroll)">✋</button>
        </div>
        <div class="annot-grp" id="an-swatches">${penSw}
          <input class="an-color" type="color" value="${annot.penColor}" onchange="anPickColor(this.value)" title="Custom colour">
        </div>
        <div class="annot-grp">
          <span class="an-lbl">Size</span>
          <input class="an-range" type="range" min="1" max="28" value="${annot.size}" oninput="anSetSize(+this.value)">
        </div>
        <div class="annot-grp">
          <button class="an-btn" onclick="anUndo()" title="Undo">↶</button>
          <button class="an-btn" onclick="anRedo()" title="Redo">↷</button>
          <button class="an-btn danger" onclick="anClearPage()" title="Clear all marks on current page">✕ Clear</button>
        </div>
        <div class="annot-grp">
          <button class="an-btn" onclick="anZoom(1/1.25)" title="Zoom out">➖</button>
          <span class="an-lbl" id="an-zoom-lbl">100%</span>
          <button class="an-btn" onclick="anZoom(1.25)" title="Zoom in">➕</button>
          <button class="an-btn" onclick="anZoomReset()" title="Reset zoom">⤢</button>
        </div>
        <div class="annot-grp">
          <button class="an-btn primary" onclick="anSaveToRepo()" title="Save an annotated copy to your library">💾 Save copy</button>
          <button class="an-btn" onclick="anDownload()" title="Download to this device">⬇️ Download</button>
        </div>
        <button class="an-btn close" onclick="anClose()" title="Close">✕ Close</button>
      </div>
    </div>
    <div class="annot-scroll" id="annot-scroll">
      <div class="annot-stage" id="annot-stage"></div>
      <div class="annot-loading" id="annot-loading"><div class="spinner"></div><div>Opening ${escapeHtml(annot.name)}…</div></div>
    </div>
    <div class="an-hint" id="an-hint">✍️ One finger draws • ✌️ two fingers scroll • or tap 🖐️ to pan.</div>`;
  document.body.appendChild(root);
  anAttachTouchScroll(root.querySelector('#annot-scroll'));
  if (!annotPointerBound){ window.addEventListener('pointerup', anGlobalPointerUp); window.addEventListener('pointercancel', anGlobalPointerUp); annotPointerBound = true; }
}

// Two-finger scrolling: one finger draws, two fingers pan the page (like
// GoodNotes/Notein). We keep touch-action:none on the ink layer so a single
// finger writes, and manually scroll the container when a second finger lands —
// aborting any in-progress single-finger stroke so no stray mark is left behind.
function anAttachTouchScroll(scroll){
  if (!scroll) return;
  let tf = null;
  const avg = (ts, key) => { let s=0; for (let i=0;i<ts.length;i++) s += ts[i][key]; return s/ts.length; };
  scroll.addEventListener('touchstart', (e) => {
    if (e.touches.length >= 2){
      if (annotDraw.drawing){ const pg = annotDraw.page; annotDraw.drawing=false; annotDraw.stroke=null; annotDraw.page=null; if (pg){ pg._cache=null; anRedraw(pg); } }
      tf = { y: avg(e.touches,'clientY'), x: avg(e.touches,'clientX'), top: scroll.scrollTop, left: scroll.scrollLeft };
    }
  }, { passive:false });
  scroll.addEventListener('touchmove', (e) => {
    if (tf && e.touches.length >= 2){
      e.preventDefault();
      scroll.scrollTop  = tf.top  - (avg(e.touches,'clientY') - tf.y);
      scroll.scrollLeft = tf.left - (avg(e.touches,'clientX') - tf.x);
    }
  }, { passive:false });
  const end = (e) => { if (!e.touches || e.touches.length < 2) tf = null; };
  scroll.addEventListener('touchend', end);
  scroll.addEventListener('touchcancel', end);
}

function anLoadingDone(){ const l = document.getElementById('annot-loading'); if (l) l.remove(); }
// Zoom the page stage so finger annotation can be precise. Uses the CSS `zoom`
// property (scales layout, so the scroll area grows and two-finger pan reaches
// everything) and getBoundingClientRect stays zoom-aware, so drawing
// coordinates remain accurate at any zoom level.
function anApplyZoom(){
  const stage = document.getElementById('annot-stage');
  if (stage) stage.style.zoom = annot.zoom;
  const lbl = document.getElementById('an-zoom-lbl');
  if (lbl) lbl.textContent = Math.round(annot.zoom * 100) + '%';
}
function anZoom(mult){ annot.zoom = Math.min(3, Math.max(0.5, (annot.zoom || 1) * mult)); anApplyZoom(); }
function anZoomReset(){ annot.zoom = 1; anApplyZoom(); }
function anError(msg){ const s = document.getElementById('annot-scroll'); if (s) s.innerHTML = `<div style="color:var(--text);text-align:center;padding:40px;max-width:520px">⚠️ ${escapeHtml(msg)}</div>`; }

// ---------- Load & render a PDF ----------
async function anLoadPdf(){
  if (typeof pdfjsLib === 'undefined'){ anError('PDF viewer library failed to load. Check your connection and reopen.'); return; }
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const res = await fetch(anFileUrl(annot.filePath), { cache:'no-store' });
    if (!res.ok) throw new Error('Could not fetch the PDF (status ' + res.status + ')');
    const original = await res.arrayBuffer();
    annot.pdfSaveBytes = original.slice(0);                 // untouched copy for saving
    const renderData = new Uint8Array(original.slice(0));   // separate copy for pdf.js
    const doc = await pdfjsLib.getDocument({ data: renderData }).promise;
    const scroll = document.getElementById('annot-stage');
    const targetW = Math.min(920, (window.innerWidth || 900) - 32);
    anLoadingDone();
    for (let i = 1; i <= doc.numPages; i++){
      const page = await doc.getPage(i);
      const base = page.getViewport({ scale: 1 });
      const scale = targetW / base.width;
      const vp = page.getViewport({ scale });
      const wrap = document.createElement('div'); wrap.className = 'annot-page';
      const baseCanvas = document.createElement('canvas');
      baseCanvas.className = 'an-base'; baseCanvas.width = Math.floor(vp.width); baseCanvas.height = Math.floor(vp.height);
      baseCanvas.style.maxWidth = '100%'; baseCanvas.style.height = 'auto';
      const ink = document.createElement('canvas');
      ink.className = 'annot-ink'; ink.width = baseCanvas.width; ink.height = baseCanvas.height;
      wrap.appendChild(baseCanvas); wrap.appendChild(ink);
      scroll.appendChild(wrap);
      await page.render({ canvasContext: baseCanvas.getContext('2d'), viewport: vp }).promise;
      const pageObj = { idx:i-1, wrap, canvas:ink, ctx:ink.getContext('2d'), w:ink.width, h:ink.height, strokes:[], redo:[] };
      annot.pages.push(pageObj);
      anAttachCanvas(pageObj);
    }
  } catch(e){ console.error(e); anError('Could not open this PDF: ' + e.message); }
}

// ---------- Load & render an HTML note (iframe + overlay) ----------
async function anLoadHtml(){
  try {
    const res = await fetch(anFileUrl(annot.filePath), { cache:'no-store' });
    if (!res.ok) throw new Error('Could not fetch the note (status ' + res.status + ')');
    const text = await res.text();
    // Keep original head/body so we can bake the overlay in on save.
    const parsed = new DOMParser().parseFromString(text, 'text/html');
    annot.htmlHead = parsed.head ? parsed.head.innerHTML : '';
    annot.htmlBody = parsed.body ? parsed.body.innerHTML : text;
    const scroll = document.getElementById('annot-stage');
    const docW = Math.min(900, (window.innerWidth || 900) - 32);
    annot.docW = docW;
    const wrap = document.createElement('div'); wrap.className = 'annot-page'; wrap.style.width = docW + 'px';
    const frame = document.createElement('iframe'); frame.className = 'an-frame'; frame.style.width = docW + 'px'; frame.style.height = '600px';
    frame.srcdoc = text;
    const ink = document.createElement('canvas'); ink.className = 'annot-ink';
    wrap.appendChild(frame); wrap.appendChild(ink); scroll.appendChild(wrap);
    frame.addEventListener('load', () => {
      try {
        const d = frame.contentDocument;
        const h = Math.max(d.body ? d.body.scrollHeight : 600, d.documentElement ? d.documentElement.scrollHeight : 600, 600);
        frame.style.height = h + 'px';
        ink.width = docW; ink.height = h; wrap.style.height = h + 'px';
        const pageObj = { idx:0, wrap, canvas:ink, ctx:ink.getContext('2d'), w:docW, h:h, strokes:[], redo:[] };
        annot.pages.push(pageObj);
        anAttachCanvas(pageObj);
        anLoadingDone();
      } catch(err){ anError('This note could not be measured for annotation (cross-origin). Open it on your live site.'); }
    });
  } catch(e){ console.error(e); anError('Could not open this note: ' + e.message); }
}

// ---------- Tools ----------
function anSetTool(t){
  annot.tool = t; annot.mode = (t === 'text') ? 'text' : (t === 'pan' ? 'pan' : 'draw');
  ['pen','highlighter','eraser','text','pan'].forEach(k => { const b = document.getElementById('an-tool-'+k); if (b) b.classList.toggle('active', k===t); });
  // In pan mode the ink layers ignore pointers so the page scrolls freely.
  document.querySelectorAll('.annot-ink').forEach(cv => cv.classList.toggle('pan', t === 'pan'));
  anRefreshSwatches();
  const hint = document.getElementById('an-hint');
  if (hint) hint.textContent = (t==='pan') ? 'Pan mode: drag or swipe to scroll the page. Pick a pen to write again.'
    : (t==='text') ? 'Click anywhere on the page to add a text box, type, then press Enter.'
    : (t==='eraser') ? 'Drag over your marks to erase them.'
    : 'One finger to ' + (t==='highlighter'?'highlight':'write') + ' • two fingers to scroll • 🖐️ to pan.';
}
// Toggle whether a single finger scrolls (on) or draws (off) on touch devices.
function anToggleFingerScroll(){
  annot.fingerScroll = !annot.fingerScroll;
  const b = document.getElementById('an-finger');
  if (b){ b.classList.toggle('active', annot.fingerScroll); b.title = annot.fingerScroll ? 'Finger scrolls (tap to let finger draw)' : 'Finger draws (tap to let finger scroll)'; }
  document.querySelectorAll('.annot-ink').forEach(cv => cv.style.touchAction = annot.fingerScroll ? 'pan-y' : 'none');
  const hint = document.getElementById('an-hint');
  if (hint) hint.textContent = annot.fingerScroll ? 'Finger now SCROLLS. Use a stylus/mouse to draw, or tap ✋ again to draw with finger.' : 'Finger now DRAWS. Tap ✋ to switch it back to scrolling.';
}
function anRefreshSwatches(){
  const cur = annot.tool === 'highlighter' ? annot.hlColor : annot.penColor;
  const list = annot.tool === 'highlighter' ? AN_HL_SWATCHES : AN_PEN_SWATCHES;
  const grp = document.getElementById('an-swatches');
  if (!grp) return;
  const colorInput = grp.querySelector('.an-color');
  grp.querySelectorAll('.an-sw').forEach((el, i) => {
    const c = list[i] || el.dataset.c;
    if (c){ el.dataset.c = c; el.style.background = c; el.setAttribute('onclick', `anPickColor('${c}')`); el.style.display=''; el.classList.toggle('active', c===cur); }
    else el.style.display='none';
  });
  if (colorInput) colorInput.value = /^#([0-9a-f]{6})$/i.test(cur) ? cur : '#000000';
}
function anPickColor(c){ if (annot.tool === 'highlighter') annot.hlColor = c; else { if (annot.tool==='eraser') anSetTool('pen'); annot.penColor = c; } anRefreshSwatches(); }
function anSetSize(v){ annot.size = v; }

// ---------- Drawing engine ----------
function anGlobalPointerUp(){
  if (!annotDraw.drawing) return;
  annotDraw.drawing = false;
  const pg = annotDraw.page;
  if (pg){
    anCompositeLive(pg);                 // make sure the final segment is painted
    if (annotDraw.stroke && annotDraw.stroke.points.length){ pg.strokes.push(annotDraw.stroke); pg.redo = []; }
    pg._cache = null;                    // release the snapshot
  }
  annotDraw.stroke = null; annotDraw.page = null; annotDraw.pending = false;
}
// Fast live rendering: when a stroke starts we snapshot the already-committed
// marks into an offscreen canvas once, then each animation frame we just blit
// that snapshot and paint ONLY the current stroke. This is O(current stroke)
// per frame instead of repainting every stroke every move, so writing stays
// smooth no matter how much is already on the page.
function anCompositeLive(pg){
  if (!pg._cache) return;
  pg.ctx.clearRect(0,0,pg.w,pg.h);
  pg.ctx.drawImage(pg._cache, 0, 0);
  if (annotDraw.stroke) anPaintStroke(pg.ctx, annotDraw.stroke);
}
function anAttachCanvas(pg){
  const cv = pg.canvas;
  const rectPos = (r, cx, cy, pr) => ({ x:(cx-r.left)*(cv.width/r.width), y:(cy-r.top)*(cv.height/r.height), p:(pr && pr>0 ? pr : 1) });
  cv.addEventListener('pointerdown', (e) => {
    if (annot.mode === 'pan') return;                          // Pan tool: let the page scroll
    if (annot.mode === 'text'){ anPlaceText(pg, e.clientX, e.clientY); return; }
    if (e.pointerType === 'touch' && annot.fingerScroll){ return; } // finger scrolls when enabled
    e.preventDefault();
    annotDraw.drawing = true; annotDraw.page = pg; annotDraw.pending = false;
    const r = cv.getBoundingClientRect();
    annotDraw.stroke = { tool: annot.tool, color: annot.tool==='highlighter'?annot.hlColor:annot.penColor, size: annot.size, points:[rectPos(r, e.clientX, e.clientY, e.pressure)] };
    // Snapshot committed marks once — fast blit source for every subsequent frame.
    if (!pg._cache){ pg._cache = document.createElement('canvas'); pg._cache.width = pg.w; pg._cache.height = pg.h; }
    const cctx = pg._cache.getContext('2d'); cctx.clearRect(0,0,pg.w,pg.h); cctx.drawImage(cv, 0, 0);
    try { cv.setPointerCapture(e.pointerId); } catch(_){}
  });
  cv.addEventListener('pointermove', (e) => {
    if (!annotDraw.drawing || annotDraw.page !== pg) return;
    e.preventDefault();
    const r = cv.getBoundingClientRect();
    const evs = (e.getCoalescedEvents && e.getCoalescedEvents().length) ? e.getCoalescedEvents() : [e];
    evs.forEach(ev => annotDraw.stroke.points.push(rectPos(r, ev.clientX, ev.clientY, ev.pressure)));
    if (!annotDraw.pending){ annotDraw.pending = true; requestAnimationFrame(() => { annotDraw.pending = false; if (annotDraw.drawing && annotDraw.page === pg) anCompositeLive(pg); }); }
  });
}
function anPaintStroke(ctx, s){
  if (s.type === 'text'){ ctx.save(); ctx.globalAlpha=1; ctx.fillStyle=s.color; ctx.font = '600 ' + s.size + 'px Inter, sans-serif'; ctx.textBaseline='top'; s.text.split('\n').forEach((ln,i)=>ctx.fillText(ln, s.x, s.y + i*s.size*1.25)); ctx.restore(); return; }
  if (!s.points || !s.points.length) return;
  ctx.save(); ctx.lineJoin='round'; ctx.lineCap='round';
  if (s.tool === 'eraser'){ ctx.globalCompositeOperation='destination-out'; ctx.strokeStyle='rgba(0,0,0,1)'; ctx.lineWidth=s.size*5; }
  else if (s.tool === 'highlighter'){ ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=0.32; ctx.strokeStyle=s.color; ctx.lineWidth=s.size*5; }
  else { ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=s.color; ctx.lineWidth=s.size; }
  ctx.beginPath();
  s.points.forEach((pt,i) => { if (s.tool==='pen') ctx.lineWidth=Math.max(0.6, s.size*pt.p); if (i===0) ctx.moveTo(pt.x, pt.y); else ctx.lineTo(pt.x, pt.y); });
  ctx.stroke(); ctx.restore();
}
function anRedraw(pg, live){ pg.ctx.clearRect(0,0,pg.w,pg.h); pg.strokes.forEach(s => anPaintStroke(pg.ctx, s)); if (live) anPaintStroke(pg.ctx, live); }
function anActivePage(){ return annotDraw.page || annot.pages[annot.pages.length-1] || null; }
function anUndo(){ const pg = anActivePage(); if (!pg || !pg.strokes.length) return; pg.redo.push(pg.strokes.pop()); anRedraw(pg); }
function anRedo(){ const pg = anActivePage(); if (!pg || !pg.redo.length) return; pg.strokes.push(pg.redo.pop()); anRedraw(pg); }
function anClearPage(){ const pg = anActivePage(); if (!pg || !pg.strokes.length) return; confirm('Clear marks', 'Remove all your marks on this page?', () => { pg.strokes=[]; pg.redo=[]; anRedraw(pg); }); }

// ---------- Text tool ----------
function anPlaceText(pg, clientX, clientY){
  const r = pg.canvas.getBoundingClientRect();
  const sx = pg.canvas.width / r.width, sy = pg.canvas.height / r.height;
  const cx = (clientX - r.left) * sx, cy = (clientY - r.top) * sy;
  const input = document.createElement('textarea');
  input.className = 'an-text-input'; input.rows = 1;
  input.style.left = (clientX - r.left) + 'px'; input.style.top = (clientY - r.top) + 'px';
  input.style.color = annot.penColor; input.style.fontSize = Math.max(12, annot.size*4) + 'px';
  pg.wrap.appendChild(input); input.focus();
  const commit = () => {
    const val = input.value.replace(/\s+$/,'');
    input.remove();
    if (!val) return;
    pg.strokes.push({ type:'text', x:cx, y:cy, text:val, color:annot.penColor, size:Math.max(12, annot.size*4)*sx });
    pg.redo = []; anRedraw(pg);
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => { if (e.key==='Enter' && !e.shiftKey){ e.preventDefault(); input.blur(); } if (e.key==='Escape'){ input.value=''; input.blur(); } });
}

// ---------- Save / download ----------
async function anBuildAnnotatedPdfBytes(){
  if (typeof PDFLib === 'undefined') throw new Error('PDF save library failed to load');
  const { PDFDocument } = PDFLib;
  const doc = await PDFDocument.load(annot.pdfSaveBytes);
  const pages = doc.getPages();
  for (let i = 0; i < pages.length && i < annot.pages.length; i++){
    const pg = annot.pages[i];
    if (!pg.strokes.length) continue;
    const png = await doc.embedPng(dataURLToUint8(pg.canvas.toDataURL('image/png')));
    const p = pages[i];
    p.drawImage(png, { x:0, y:0, width:p.getWidth(), height:p.getHeight() });
  }
  return await doc.save();
}
function anBuildAnnotatedHtml(){
  const pg = annot.pages[0];
  const overlay = pg && pg.strokes.length ? pg.canvas.toDataURL('image/png') : '';
  return `<!DOCTYPE html>
<html>
<head>
${annot.htmlHead}
<style>body{margin:0}.annot-wrap{position:relative;width:${annot.docW}px;max-width:100%;margin:0 auto}.annot-overlay{position:absolute;top:0;left:0;width:100%;height:auto;pointer-events:none;z-index:99999}</style>
</head>
<body>
<div class="annot-wrap">
${annot.htmlBody}
${overlay ? `<img class="annot-overlay" src="${overlay}" alt="annotations">` : ''}
</div>
</body>
</html>`;
}
function anHasMarks(){ return annot.pages.some(p => p.strokes && p.strokes.length); }
function anAnnotatedName(ext){ const base = baseName(annot.filePath).replace(/\.(pdf|html?|HTML?|PDF)$/,''); return base + '-annotated-' + Date.now() + '.' + ext; }

async function anDownload(){
  if (!anHasMarks()){ toast('Add some marks first', 'error'); return; }
  try {
    if (annot.type === 'pdf'){
      const bytes = await anBuildAnnotatedPdfBytes();
      const blob = new Blob([bytes], { type:'application/pdf' });
      anTriggerDownload(blob, anAnnotatedName('pdf'));
    } else {
      const blob = new Blob([anBuildAnnotatedHtml()], { type:'text/html' });
      anTriggerDownload(blob, anAnnotatedName('html'));
    }
    toast('Downloaded', 'success');
  } catch(e){ toast('Download failed: ' + e.message, 'error'); console.error(e); }
}
function anTriggerDownload(blob, name){ const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href), 4000); }

async function anSaveToRepo(){
  const token = localStorage.getItem('mgr_github_token');
  if (!token){ toast('Set your GitHub token in Settings to save to your library', 'error'); return; }
  if (!anHasMarks()){ toast('Add some marks first (or use Download)', 'error'); return; }
  const ext = annot.type === 'pdf' ? 'pdf' : 'html';
  const fileName = anAnnotatedName(ext);
  const folderDir = dirName(annot.filePath);              // save next to the original
  const targetPath = (folderDir ? folderDir + '/' : '') + fileName;
  setStatus('⏳ Saving annotated copy...');
  toast('Saving annotated copy…');
  try {
    let base64;
    if (annot.type === 'pdf'){ const bytes = await anBuildAnnotatedPdfBytes(); let bin=''; const CH=0x8000; for (let i=0;i<bytes.length;i+=CH) bin += String.fromCharCode.apply(null, bytes.subarray(i, i+CH)); base64 = btoa(bin); }
    else { base64 = btoa(unescape(encodeURIComponent(anBuildAnnotatedHtml()))); }
    const res = await fetch(API_URL + encodePath(targetPath), {
      method:'PUT',
      headers:{ 'Authorization':`token ${token}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ message:`Add annotated copy ${targetPath}`, content: base64, branch:'main' })
    });
    if (!res.ok){ const err = await res.json().catch(()=>({})); toast('Save failed: ' + (err.message || res.status), 'error'); setStatus('❌ Failed'); return; }
    const d = await res.json();
    allFiles.push({ name: fileName, path: targetPath, size: 0, type:'file', sha: d.content.sha });
    displayNames[targetPath] = annot.name + ' (annotated)';
    const serials = Object.values(fileOrder).filter(n => typeof n==='number' && !isNaN(n));
    fileOrder[targetPath] = (serials.length ? Math.max(...serials) : 0) + 1;
    saveAndPublish();
    toast('✅ Annotated copy saved to your library', 'success');
    const folderId = folderDir ? (folders.find(f => f.path === folderDir) || {}).id : null;
    anClose();
    openFolder(folderId || '__unassigned__');
  } catch(e){ toast('Error: ' + e.message, 'error'); setStatus('❌ Error'); console.error(e); }
}

// ==================== START ====================
init();
// If Chart.js finishes loading after the first render, draw the charts once ready.
window.addEventListener('load', () => {
  if (currentView === 'home' && typeof Chart !== 'undefined' && Object.keys(dashCharts).length === 0) {
    initHomeDashboard();
  }
});
</script>
