<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parmar Railway Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;flex-direction:column}
.top-bar{background:#161b22;border-bottom:1px solid #30363d;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
.top-bar-left{display:flex;flex-direction:column;gap:4px}
.site-name{font-size:16px;font-weight:700;color:#ffd54f}
.breadcrumb{font-size:13px;color:#8b949e;display:flex;align-items:center;gap:6px}
.bc-link{cursor:pointer;color:#58a6ff;transition:color .2s}
.bc-link:hover{color:#79c0ff}
.bc-sep{color:#484f58}
.bc-current{color:#e6edf3}
.top-bar-right{display:flex;align-items:center}
.search-box{display:flex;align-items:center;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:6px 12px;gap:8px;transition:border-color .2s}
.search-box:focus-within{border-color:#58a6ff}
.search-icon{color:#8b949e;flex-shrink:0}
.search-box input{background:none;border:none;color:#e6edf3;font-size:14px;outline:none;width:180px;font-family:inherit}
.search-box input::placeholder{color:#484f58}
.main-content{flex:1;padding:24px;max-width:1200px;margin:0 auto;width:100%}
.home-view{animation:fadeIn .3s ease}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.section-header h2{font-size:22px;font-weight:600}
.folder-total{color:#8b949e;font-size:14px}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px}
.folder-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px 12px;text-align:center;cursor:pointer;transition:all .2s ease;position:relative;overflow:hidden}
.folder-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--folder-color);opacity:0.8}
.folder-card:hover{transform:translateY(-4px);border-color:var(--folder-color);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.folder-icon{font-size:48px;margin-bottom:10px}
.folder-name{font-size:13px;font-weight:600;color:#e6edf3;margin-bottom:4px;word-break:break-word}
.folder-count{font-size:11px;color:#8b949e}
.folder-view{animation:fadeIn .3s ease}
.folder-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.back-btn{display:flex;align-items:center;gap:4px;background:#21262d;border:1px solid #30363d;border-radius:8px;padding:8px 14px;color:#e6edf3;font-size:14px;cursor:pointer;transition:all .2s;font-family:inherit}
.back-btn:hover{background:#30363d;border-color:#58a6ff}
.folder-title{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:600}
.folder-title-icon{font-size:24px}
.file-count-badge{font-size:12px;font-weight:500;color:#8b949e;background:#21262d;border-radius:12px;padding:3px 10px}
.view-toggle{margin-left:auto;display:flex;gap:4px}
.toggle-btn{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:6px 8px;cursor:pointer;color:#8b949e;transition:all .2s}
.toggle-btn.active{color:#e6edf3;border-color:#58a6ff;background:#161b22}
.toggle-btn:hover{color:#e6edf3}
.file-list{display:flex;flex-direction:column;gap:4px}
.file-row{display:flex;align-items:center;gap:14px;padding:12px 16px;background:#161b22;border:1px solid #30363d;border-radius:10px;cursor:pointer;transition:all .2s}
.file-row:hover{background:#21262d;border-color:#484f58;transform:translateX(4px)}
.file-row-icon{font-size:28px;flex-shrink:0}
.file-row-info{flex:1;min-width:0}
.file-row-name{font-size:14px;font-weight:500;color:#e6edf3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-row-meta{font-size:12px;color:#8b949e;margin-top:2px}
.type-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0}
.badge-html{background:#1a3a2a;color:#3fb950}
.badge-pdf{background:#3d1a1a;color:#f85149}
.dl-pdf-btn{background:#21262d;border:1px solid #30363d;border-radius:6px;color:#58a6ff;font-size:11px;font-weight:600;padding:5px 9px;cursor:pointer;flex-shrink:0;transition:all .2s;display:inline-flex;align-items:center;gap:4px;font-family:inherit;white-space:nowrap}
.dl-pdf-btn:hover{border-color:#58a6ff;background:#161b22;color:#79c0ff}
.file-card-actions{margin-top:8px;display:flex;justify-content:center}
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.file-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all .2s}
.file-card:hover{background:#21262d;border-color:#484f58;transform:translateY(-2px)}
.file-card-icon{font-size:36px;margin-bottom:8px}
.file-card-name{font-size:12px;font-weight:500;color:#e6edf3;margin-bottom:6px;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.file-card-meta{font-size:11px;color:#8b949e}
.empty-state{text-align:center;padding:48px;color:#8b949e;font-size:15px}
.pdf-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;padding:20px}
.pdf-modal.active{display:flex}
.pdf-container{background:#161b22;border:1px solid #30363d;border-radius:12px;width:100%;max-width:900px;height:85vh;display:flex;flex-direction:column;overflow:hidden}
.pdf-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #30363d;gap:12px}
.pdf-title{font-size:15px;font-weight:600;color:#e6edf3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pdf-actions{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pdf-newtab-btn{color:#58a6ff;font-size:13px;text-decoration:none}
.pdf-newtab-btn:hover{text-decoration:underline}
.pdf-close-btn{background:#21262d;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:18px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pdf-close-btn:hover{background:#f85149;border-color:#f85149}
.pdf-frame{flex:1;border:none;width:100%}
.footer{background:#161b22;border-top:1px solid #30363d;padding:16px 24px;text-align:center}
.footer-links{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.footer-link{color:#58a6ff;text-decoration:none;font-size:13px}
.footer-link:hover{text-decoration:underline}
.footer-sep{color:#30363d}
.footer-copy{font-size:12px;color:#484f58}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){
.top-bar{padding:10px 16px}
.main-content{padding:16px}
.folder-grid{grid-template-columns:repeat(2,1fr);gap:12px}
.folder-icon{font-size:36px}
.folder-card{padding:16px 10px}
.search-box input{width:120px}
.folder-header{gap:10px}
.folder-title{font-size:16px}
.file-grid{grid-template-columns:repeat(2,1fr)}
.file-row{padding:10px 12px;gap:10px}
.pdf-container{height:90vh;border-radius:8px}
}
@media(max-width:480px){
.folder-grid{grid-template-columns:repeat(2,1fr);gap:10px}
.folder-icon{font-size:32px}
.folder-name{font-size:12px}
.top-bar{flex-direction:column;align-items:flex-start}
.search-box{width:100%}
.search-box input{width:100%}
.view-toggle{margin-left:0}
}
.pdf-loading{position:fixed;inset:0;background:rgba(13,17,23,.78);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
.pdf-loading.show{display:flex}
.pdf-loading .spinner{width:46px;height:46px;border:4px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin 1s linear infinite}
.pdf-loading .msg{color:#e6edf3;font-size:14px;font-weight:600}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="pdf-loading" class="pdf-loading"><div class="spinner"></div><div class="msg">Generating PDF…</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
const REPO_OWNER = 'purendar950';
const REPO_NAME = 'Hand-written-notes-sample-';
const CONFIG_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/config.json`;
const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;

let folders = [];
let fileAssignments = {};
let hiddenFiles = [];
let displayNames = {};
let fileOrder = {};
let allFiles = [];
let currentFolder = null;
let viewMode = 'list';
let siteName = 'Parmar Railway Notes';
let siteSubtitle = 'Hand-Written Notes Library';
let telegramLink = 'https://t.me/Exam_Zen_StudySync';
let searchQuery = '';
const EXCLUDED_FILES = ['index.html', 'manager.html', 'config.json'];

async function loadConfig() {
  // Always fetch the published config.json first (cache-busted) so every
  // visitor sees the latest admin changes. localStorage is only an offline
  // fallback, never the primary source.
  try {
    const res = await fetch(CONFIG_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (res.ok) {
      const data = await res.json();
      folders = data.folders || [];
      fileAssignments = data.fileAssignments || {};
      hiddenFiles = data.hiddenFiles || [];
      displayNames = data.displayNames || {};
      fileOrder = data.fileOrder || {};
      if (data.siteName) siteName = data.siteName;
      if (data.siteSubtitle) siteSubtitle = data.siteSubtitle;
      if (data.telegramLink) telegramLink = data.telegramLink;
      // Mirror to localStorage for offline fallback only.
      localStorage.setItem('mgr_folders', JSON.stringify(folders));
      localStorage.setItem('mgr_assignments', JSON.stringify(fileAssignments));
      localStorage.setItem('mgr_hidden', JSON.stringify(hiddenFiles));
      localStorage.setItem('mgr_displayNames', JSON.stringify(displayNames));
      localStorage.setItem('mgr_fileOrder', JSON.stringify(fileOrder));
      localStorage.setItem('mgr_settings', JSON.stringify({ siteName, siteSubtitle, telegramLink }));
      return;
    }
  } catch(e) { console.error('Config load failed, using offline fallback:', e); }

  // Network failed — fall back to last known config from localStorage.
  const localFolders = localStorage.getItem('mgr_folders');
  const localAssignments = localStorage.getItem('mgr_assignments');
  if (localFolders && localAssignments) {
    folders = JSON.parse(localFolders);
    fileAssignments = JSON.parse(localAssignments);
    hiddenFiles = JSON.parse(localStorage.getItem('mgr_hidden') || '[]');
    displayNames = JSON.parse(localStorage.getItem('mgr_displayNames') || '{}');
    fileOrder = JSON.parse(localStorage.getItem('mgr_fileOrder') || '{}');
    const s = JSON.parse(localStorage.getItem('mgr_settings') || '{}');
    if (s.siteName) siteName = s.siteName;
    if (s.siteSubtitle) siteSubtitle = s.siteSubtitle;
    if (s.telegramLink) telegramLink = s.telegramLink;
  }
}

async function loadFiles() {
  // 1) Try the live GitHub listing (cache-busted) — this gives real file sizes.
  let apiFiles = [];
  try {
    const res = await fetch(API_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (res.ok) {
      const data = await res.json();
      apiFiles = data.filter(f => f.type === 'file')
        .filter(f => !EXCLUDED_FILES.includes(f.name))
        .filter(f => !f.name.startsWith('.'));
    } else {
      console.warn('GitHub file listing unavailable (status ' + res.status + '), using config.json as source.');
    }
  } catch(e) { console.error('Files load failed, using config.json as source:', e); }

  // 2) Merge with files the published config.json already knows about. This makes
  //    newly uploaded/assigned files appear immediately even when the GitHub API
  //    listing is cached or rate-limited, and keeps the page working as a fallback
  //    when the API call fails entirely.
  const fileMap = {};
  apiFiles.forEach(f => { fileMap[f.name] = { name: f.name, size: f.size, type: 'file' }; });
  const knownFromConfig = new Set([
    ...Object.keys(fileAssignments || {}),
    ...Object.keys(displayNames || {})
  ]);
  knownFromConfig.forEach(name => {
    if (!fileMap[name] && !EXCLUDED_FILES.includes(name) && !name.startsWith('.')) {
      fileMap[name] = { name, size: 0, type: 'file' };
    }
  });

  // 3) Drop hidden files.
  allFiles = Object.values(fileMap).filter(f => !hiddenFiles.includes(f.name));
}

function getFileIcon(name) {
  const n = name.toLowerCase();
  if (n.includes('music')) return '\u{1F3B5}';
  if (n.includes('festival')) return '\u{1F389}';
  if (n.includes('culture') || n.includes('architecture')) return '\u{1F3DB}\uFE0F';
  if (n.includes('book') || n.includes('author')) return '\u{1F4DA}';
  if (n.includes('current') || n.includes('affairs') || n.includes('gk')) return '\u{1F4F0}';
  if (n.includes('sample') || n.includes('hand')) return '\u270D\uFE0F';
  if (n.endsWith('.pdf')) return '\u{1F4D5}';
  return '\u{1F4C4}';
}

function getFileType(name) {
  if (name.endsWith('.pdf')) return 'PDF';
  if (name.endsWith('.html') || name.endsWith('.htm')) return 'HTML';
  return 'FILE';
}

function getDisplayName(filename) {
  if (displayNames[filename]) return displayNames[filename];
  return filename.replace(/\.(html|htm|pdf)$/i, '');
}

function getFileUrl(filename) {
  const host = window.location.hostname;
  if (host.includes('github.io')) return './' + encodeURIComponent(filename);
  return `https://${REPO_OWNER}.github.io/${REPO_NAME}/` + encodeURIComponent(filename);
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function getFilesInFolder(folderId) {
  return allFiles.filter(f => fileAssignments[f.name] === folderId);
}

function getUnassignedFiles() {
  // Treat a file as unassigned if it has no folder OR its folder no longer
  // exists, so files never vanish because of a stale/deleted assignment.
  const folderIds = new Set(folders.map(f => f.id));
  return allFiles.filter(f => {
    const assigned = fileAssignments[f.name];
    return !assigned || !folderIds.has(assigned);
  });
}

function openFile(filename) {
  const url = getFileUrl(filename);
  const type = getFileType(filename);
  if (type === 'PDF') { showPdfModal(filename, url); }
  else { window.open(url, '_blank'); }
}

// Directly download an HTML note as a .pdf file (no print dialog needed).
// The note is rendered in a hidden same-origin iframe so its exact styling is
// preserved, then html2pdf.js rasterises it and triggers a direct file
// download. If the library is unavailable, we fall back to the browser's
// print-to-PDF dialog.
function downloadAsPdf(filename) {
  const url = getFileUrl(filename);
  const baseName = getDisplayName(filename).replace(/\.(html?|pdf)$/i, '').trim() || 'note';
  if (typeof html2pdf === 'undefined') { downloadViaPrint(url); return; }

  showPdfLoading(true);
  const frame = document.createElement('iframe');
  frame.style.position = 'fixed';
  frame.style.left = '-10000px';
  frame.style.top = '0';
  frame.style.width = '794px';   // ~A4 width at 96dpi for faithful layout
  frame.style.height = '1123px';
  frame.style.border = '0';
  frame.setAttribute('aria-hidden', 'true');

  let finished = false;
  const cleanup = () => { setTimeout(() => { if (frame.parentNode) frame.remove(); }, 500); };
  const finish = () => { if (finished) return; finished = true; showPdfLoading(false); cleanup(); };
  const fallback = () => { if (finished) return; finished = true; showPdfLoading(false); downloadViaPrint(url); cleanup(); };

  frame.onload = () => {
    // Give the note a moment to apply fonts/images before rasterising.
    setTimeout(() => {
      let target;
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        target = doc.body || doc.documentElement;
      } catch (e) { fallback(); return; }
      if (!target) { fallback(); return; }
      const opt = {
        margin: [8, 8, 8, 8],
        filename: baseName + '.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
      };
      try {
        html2pdf().set(opt).from(target).save().then(finish).catch(fallback);
      } catch (e) { fallback(); }
    }, 600);
  };
  frame.onerror = fallback;
  frame.src = url;
  document.body.appendChild(frame);
  // Safety timeout in case rendering hangs.
  setTimeout(() => { if (!finished) fallback(); }, 30000);
}

function showPdfLoading(show) {
  const el = document.getElementById('pdf-loading');
  if (el) el.classList.toggle('show', !!show);
}

// Fallback: open the note in a hidden iframe and invoke the browser's native
// print dialog so the user can choose "Save as PDF".
function downloadViaPrint(url) {
  const frame = document.createElement('iframe');
  frame.style.position = 'fixed';
  frame.style.right = '0';
  frame.style.bottom = '0';
  frame.style.width = '0';
  frame.style.height = '0';
  frame.style.border = '0';
  frame.style.opacity = '0';
  frame.setAttribute('aria-hidden', 'true');
  let done = false;
  const cleanup = () => { setTimeout(() => { if (frame.parentNode) frame.remove(); }, 1500); };
  frame.onload = () => {
    if (done) return;
    done = true;
    setTimeout(() => {
      try { frame.contentWindow.focus(); frame.contentWindow.print(); }
      catch (e) { window.open(url, '_blank'); }
      cleanup();
    }, 400);
  };
  frame.onerror = () => { window.open(url, '_blank'); cleanup(); };
  frame.src = url;
  document.body.appendChild(frame);
}

function showPdfModal(filename, url) {
  const modal = document.getElementById('pdf-modal');
  document.getElementById('pdf-title').textContent = getDisplayName(filename);
  document.getElementById('pdf-frame').src = url;
  document.getElementById('pdf-newtab').href = url;
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closePdfModal() {
  const modal = document.getElementById('pdf-modal');
  modal.classList.remove('active');
  document.getElementById('pdf-frame').src = '';
  document.body.style.overflow = '';
}

function navigateToFolder(folder) {
  currentFolder = folder;
  searchQuery = '';
  render();
}

function navigateHome() {
  currentFolder = null;
  searchQuery = '';
  render();
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderTopBar() + '<main class="main-content">' + (currentFolder ? renderFolderView() : renderHomeView()) + '</main>' + renderFooter() + renderPdfModal();
  attachEvents();
}

function renderTopBar() {
  const breadcrumb = currentFolder
    ? '<span class="bc-link" onclick="navigateHome()">\u{1F4C1} Home</span><span class="bc-sep">\u203A</span><span class="bc-current">' + (currentFolder.icon || '\u{1F4C1}') + ' ' + currentFolder.name + '</span>'
    : '<span class="bc-current">\u{1F4C1} Home</span>';
  return '<header class="top-bar"><div class="top-bar-left"><div class="site-name">' + siteName + '</div><div class="breadcrumb">' + breadcrumb + '</div></div><div class="top-bar-right"><div class="search-box"><svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" id="search-input" placeholder="Search files..." value="' + searchQuery + '"></div></div></header>';
}

function renderHomeView() {
  const sortedFolders = [...folders].sort((a,b) => (a.order||99) - (b.order||99));
  const unassigned = getUnassignedFiles();
  let folderCards = sortedFolders.map(folder => {
    const count = getFilesInFolder(folder.id).length;
    const dataAttr = encodeURIComponent(JSON.stringify(folder));
    return '<div class="folder-card" onclick="navigateToFolder(JSON.parse(decodeURIComponent(\'' + dataAttr + '\')))" style="--folder-color:' + (folder.color || '#ffd54f') + '"><div class="folder-icon">' + (folder.icon || '\u{1F4C1}') + '</div><div class="folder-name">' + folder.name + '</div><div class="folder-count">' + count + ' file' + (count !== 1 ? 's' : '') + '</div></div>';
  }).join('');

  if (unassigned.length > 0) {
    const uData = encodeURIComponent(JSON.stringify({id:'__unassigned__',name:'Other Files',icon:'\u{1F4C2}',color:'#8b949e'}));
    folderCards += '<div class="folder-card" onclick="navigateToFolder(JSON.parse(decodeURIComponent(\'' + uData + '\')))" style="--folder-color:#8b949e"><div class="folder-icon">\u{1F4C2}</div><div class="folder-name">Other Files</div><div class="folder-count">' + unassigned.length + ' file' + (unassigned.length !== 1 ? 's' : '') + '</div></div>';
  }

  return '<div class="home-view"><div class="section-header"><h2>\u{1F4C2} My Folders</h2><span class="folder-total">' + folders.length + ' folder' + (folders.length !== 1 ? 's' : '') + '</span></div><div class="folder-grid">' + folderCards + '</div></div>';
}

function renderFolderView() {
  let files = currentFolder.id === '__unassigned__' ? getUnassignedFiles() : getFilesInFolder(currentFolder.id);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    files = files.filter(f => getDisplayName(f.name).toLowerCase().includes(q) || f.name.toLowerCase().includes(q));
  }
  // Sort strictly by serial number (admin-assigned). Files without a serial
  // number fall to the end, tie-broken by display name so order stays stable.
  files = files.slice().sort((a, b) => {
    const oA = fileOrder[a.name] !== undefined ? fileOrder[a.name] : Number.MAX_SAFE_INTEGER;
    const oB = fileOrder[b.name] !== undefined ? fileOrder[b.name] : Number.MAX_SAFE_INTEGER;
    return oA - oB || getDisplayName(a.name).localeCompare(getDisplayName(b.name));
  });
  const fileItems = files.map(f => {
    const icon = getFileIcon(f.name);
    const name = getDisplayName(f.name);
    const type = getFileType(f.name);
    const size = formatSize(f.size);
    const typeClass = type === 'PDF' ? 'badge-pdf' : 'badge-html';
    const escapedName = f.name.replace(/'/g, "\\'");
    const pdfBtn = type === 'HTML'
      ? '<button class="dl-pdf-btn" onclick="event.stopPropagation();downloadAsPdf(\'' + escapedName + '\')" title="Download this note as PDF">\u2B07\uFE0F PDF</button>'
      : '';
    if (viewMode === 'grid') {
      return '<div class="file-card" onclick="openFile(\'' + escapedName + '\')"><div class="file-card-icon">' + icon + '</div><div class="file-card-name">' + name + '</div><div class="file-card-meta"><span class="type-badge ' + typeClass + '">' + type + '</span>' + (size ? ' \u2022 ' + size : '') + '</div>' + (pdfBtn ? '<div class="file-card-actions">' + pdfBtn + '</div>' : '') + '</div>';
    }
    return '<div class="file-row" onclick="openFile(\'' + escapedName + '\')"><div class="file-row-icon">' + icon + '</div><div class="file-row-info"><div class="file-row-name">' + name + '</div><div class="file-row-meta">' + size + '</div></div>' + pdfBtn + '<span class="type-badge ' + typeClass + '">' + type + '</span></div>';
  }).join('');

  const backBtn = '<button class="back-btn" onclick="navigateHome()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>Back</button>';
  const title = '<div class="folder-title"><span class="folder-title-icon">' + (currentFolder.icon || '\u{1F4C1}') + '</span><span>' + currentFolder.name + '</span><span class="file-count-badge">' + files.length + ' file' + (files.length !== 1 ? 's' : '') + '</span></div>';
  const toggle = '<div class="view-toggle"><button class="toggle-btn ' + (viewMode==='list'?'active':'') + '" onclick="viewMode=\'list\';render();" title="List view"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button><button class="toggle-btn ' + (viewMode==='grid'?'active':'') + '" onclick="viewMode=\'grid\';render();" title="Grid view"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button></div>';

  return '<div class="folder-view"><div class="folder-header">' + backBtn + title + toggle + '</div><div class="' + (viewMode === 'grid' ? 'file-grid' : 'file-list') + '">' + (fileItems || '<div class="empty-state">No files in this folder</div>') + '</div></div>';
}

function renderFooter() {
  return '<footer class="footer"><div class="footer-links"><a href="' + telegramLink + '" target="_blank" class="footer-link">\u{1F4F1} Telegram Channel</a><span class="footer-sep">\u2022</span><a href="https://github.com/' + REPO_OWNER + '/' + REPO_NAME + '" target="_blank" class="footer-link">\u2B50 GitHub</a></div><div class="footer-copy">\u00A9 2026 ' + siteName + '</div></footer>';
}

function renderPdfModal() {
  return '<div id="pdf-modal" class="pdf-modal" onclick="if(event.target===this)closePdfModal()"><div class="pdf-container"><div class="pdf-header"><span id="pdf-title" class="pdf-title"></span><div class="pdf-actions"><a id="pdf-newtab" href="#" target="_blank" class="pdf-newtab-btn">Open in New Tab \u2197</a><button class="pdf-close-btn" onclick="closePdfModal()">\u2715</button></div></div><iframe id="pdf-frame" class="pdf-frame" src=""></iframe></div></div>';
}

function attachEvents() {
  const input = document.getElementById('search-input');
  if (input) {
    input.addEventListener('input', (e) => { searchQuery = e.target.value; if (currentFolder) render(); });
  }
}

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePdfModal(); });

async function init() {
  await loadConfig();
  await loadFiles();
  render();
}
init();
</script>
</body>
</html>
