<style>
  :root{
    --paper:#fdfaf1;
    --paper2:#fbf7ec;
    --line:#b9d3e8;
    --margin-red:#e2857a;
    --ink-blue:#1c3fae;
    --ink-blue-dark:#132a7a;
    --marker-red:#d21f1f;
    --marker-red2:#b3151c;
    --highlight:#fff176;
    --highlight2:#ffe36e;
    --purple:#5b2a86;
    --green:#1f7a3d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#3d3a35;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.03), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(255,255,255,0.03), transparent 40%);
    font-family:'Kalam', cursive;
    padding:28px 10px 80px;
  }
  .notebook{
    max-width:900px;
    margin:0 auto;
  }
  /* ---------- PAGE (ruled paper) ---------- */
  .page{
    position:relative;
    background:
      repeating-linear-gradient(
        var(--paper) 0px, var(--paper) 33px,
        var(--line) 34px, var(--paper) 35px
      );
    background-color:var(--paper);
    border-radius:3px;
    padding:34px 34px 34px 74px;
    margin-bottom:26px;
    box-shadow:
      0 2px 0 rgba(0,0,0,0.06),
      0 18px 34px rgba(0,0,0,0.35),
      0 2px 6px rgba(0,0,0,0.25);
    background-attachment:local;
    line-height:34px;
  }
  .page::before{ /* red margin line */
    content:"";
    position:absolute;
    top:0; bottom:0; left:52px;
    width:2px;
    background:var(--margin-red);
    opacity:0.55;
  }
  .page::after{ /* punch holes */
    content:"";
    position:absolute;
    left:18px; top:26px;
    width:12px; height:calc(100% - 52px);
    background-image:radial-gradient(circle, #d8d2c0 5px, transparent 5.5px);
    background-size:12px 90px;
    background-repeat:repeat-y;
    opacity:0.7;
  }
  .page.tilt1{transform:rotate(-0.45deg);}
  .page.tilt2{transform:rotate(0.35deg);}
  .page.tilt3{transform:rotate(-0.25deg);}
  .page.tilt4{transform:rotate(0.5deg);}

  /* torn top edge */
  .torn{
    height:14px;
    background:linear-gradient(115deg, transparent 49%, #3d3a35 49%, #3d3a35 51%, transparent 51%),
               linear-gradient(245deg, transparent 49%, #3d3a35 49%, #3d3a35 51%, transparent 51%);
    background-size:22px 100%;
    background-repeat:repeat-x;
    margin:-34px -34px 10px -74px;
    opacity:0.5;
  }

  /* ---------- COVER PAGE ---------- */
  .cover{
    text-align:center;
    padding:40px 30px 34px;
  }
  .cover .stamp{
    display:inline-block;
    border:3px solid var(--marker-red);
    color:var(--marker-red);
    font-weight:700;
    font-size:15px;
    padding:4px 14px;
    border-radius:50%/40%;
    transform:rotate(-6deg);
    letter-spacing:1px;
  }
  .cover h1{
    font-family:'Kalam',cursive;
    font-weight:700;
    color:var(--marker-red2);
    font-size:44px;
    margin:14px 0 4px;
    text-shadow:1px 1px 0 rgba(0,0,0,0.08);
    line-height:1.15;
  }
  .cover h2{
    color:var(--ink-blue-dark);
    font-size:24px;
    font-weight:700;
    margin:6px 0 2px;
  }
  .cover .sub{
    color:var(--purple);
    font-size:19px;
    margin-top:4px;
  }
  .scribble-underline{
    width:260px;height:14px;margin:6px auto 18px;
    border-bottom:4px solid var(--marker-red);
    border-radius:50%;
    opacity:0.75;
  }
  .cover .date{
    font-size:16px;color:#555;margin-top:10px;
  }

  /* topic index box */
  .index-box{
    border:2.5px dashed var(--ink-blue);
    border-radius:14px;
    padding:14px 18px;
    margin-top:20px;
    text-align:left;
    background:rgba(255,255,255,0.4);
  }
  .index-box .idx-title{
    color:var(--marker-red2);font-weight:700;font-size:19px;
    text-align:center;margin-bottom:8px;
  }
  .idx-grid{
    display:grid;grid-template-columns:1fr 1fr;
    gap:2px 18px;font-size:15px;color:var(--ink-blue-dark);
    line-height:26px;
  }
  .idx-grid span.num{color:var(--marker-red);font-weight:700;margin-right:4px;}
  .idx-grid .today{
    background:var(--highlight);
    border-radius:4px;padding:0 4px;
    font-weight:700;
  }

  /* ---------- SECTION HEADER ---------- */
  .section-head{
    text-align:center;
    margin:6px 0 14px;
  }
  .section-head .banner{
    display:inline-block;
    background:var(--marker-red2);
    color:#fff8e7;
    font-weight:700;
    font-size:26px;
    padding:6px 26px;
    border-radius:6px;
    transform:rotate(-1.2deg);
    box-shadow:3px 3px 0 rgba(0,0,0,0.18);
    letter-spacing:1px;
  }
  .section-head .doodle-row{
    margin-top:8px;font-size:22px;letter-spacing:14px;opacity:0.8;
  }

  /* ---------- QUESTION BLOCK ---------- */
  .qblock{
    margin-bottom:8px;
    padding-bottom:10px;
    border-bottom:1.5px dotted #c9c2ac;
  }
  .qblock:last-child{border-bottom:none;}
  .flexwrap{
    display:flex;
    gap:18px;
    align-items:flex-start;
    flex-wrap:wrap;
  }
  .qtext-col{flex:1 1 380px; min-width:260px;}
  .diagram-col{flex:0 0 240px; max-width:260px; margin-top:4px;}

  .qnum{
    display:inline-block;
    color:#fff;
    background:var(--marker-red2);
    font-weight:700;
    border-radius:50%;
    width:34px;height:34px;
    line-height:34px;
    text-align:center;
    transform:rotate(-4deg);
    margin-right:8px;
    font-size:17px;
    box-shadow:2px 2px 0 rgba(0,0,0,0.15);
  }
  .qhead{
    color:var(--ink-blue-dark);
    font-size:19px;
    font-weight:400;
  }
  .qhead b{color:var(--marker-red2);font-weight:700;}

  ul.options{
    list-style:none;
    margin:6px 0 4px 0;
    padding-left:44px;
  }
  ul.options li{
    color:var(--ink-blue);
    font-size:18px;
    margin:3px 0;
    position:relative;
    width:fit-content;
  }
  ul.options li.correct{
    font-weight:700;
    color:var(--marker-red2);
    background:linear-gradient(100deg, transparent 0%, var(--highlight) 8%, var(--highlight2) 92%, transparent 100%);
    padding:1px 10px;
    border:2.5px solid var(--marker-red);
    border-radius:50% 20% 50% 20% / 20% 50% 20% 50%;
    transform:rotate(-1.4deg);
    box-shadow:1px 1px 0 rgba(0,0,0,0.05);
  }
  ul.options li.correct::before{
    content:"✔";
    position:absolute;
    left:-30px;
    color:var(--green);
    font-weight:700;
  }
  .note-nomatch{
    display:inline-block;
    margin:4px 0 4px 44px;
    background:#ffe9e9;
    border:2px dashed var(--marker-red);
    border-radius:8px;
    padding:4px 10px;
    color:var(--marker-red2);
    font-size:15.5px;
    transform:rotate(-1deg);
  }

  .ans-line{
    margin:4px 0 2px 44px;
    color:var(--green);
    font-weight:700;
    font-size:16.5px;
  }
  .ans-line .hl{background:var(--highlight);padding:0 6px;border-radius:3px;}

  .exp-label{
    color:var(--marker-red2);
    font-weight:700;
    font-size:17px;
    margin:6px 0 2px 44px;
    text-decoration:underline wavy var(--marker-red2) 1.5px;
  }
  ul.exp-list{
    margin:2px 0 6px 0;
    padding-left:64px;
    color:var(--ink-blue);
    font-size:17.5px;
  }
  ul.exp-list li{
    margin:3px 0;
    list-style-type:"— ";
  }
  .red-term{
    color:var(--marker-red2);
    font-weight:700;
  }
  .hl{
    background:linear-gradient(100deg, var(--highlight) 0%, var(--highlight2) 100%);
    padding:0 4px;
    border-radius:3px;
    box-decoration-break:clone;
    -webkit-box-decoration-break:clone;
  }
  .circle-word{
    border:2px solid var(--marker-red);
    border-radius:50% 40% 50% 40%/40% 50% 40% 50%;
    padding:0 6px;
  }

  .tip-box{
    margin:8px 0 6px 44px;
    max-width:520px;
    background:#fff3c4;
    border:2px solid #e0b400;
    border-left:6px solid var(--marker-red2);
    border-radius:4px 12px 4px 12px;
    padding:7px 12px;
    font-size:16.5px;
    color:#4a3b00;
    transform:rotate(-0.6deg);
    box-shadow:2px 3px 6px rgba(0,0,0,0.12);
  }
  .tip-box b{color:var(--marker-red2);}
  .tip-box.mistake{background:#ffe0e0;border-color:#c94b4b;}
  .tip-box.trick{background:#e2f4e2;border-color:#3f9142;}

  /* doodles */
  .doodle{
    position:absolute;
    font-size:22px;
    opacity:0.75;
    pointer-events:none;
    user-select:none;
  }
  .page{overflow:hidden;}

  /* ---------- SVG DIAGRAM STYLING ---------- */
  .diagram-title{
    text-align:center;font-size:15px;color:var(--purple);font-weight:700;
    margin-bottom:2px;text-decoration:underline;
  }
  .diagram-box{
    border:2px dashed var(--purple);
    border-radius:10px;
    padding:6px;
    background:rgba(255,255,255,0.5);
    transform:rotate(0.8deg);
  }
  .diagram-box svg{width:100%;height:auto;display:block;}

  /* final summary page */
  .summary-title{
    text-align:center;color:var(--marker-red2);font-weight:700;font-size:25px;
    margin-bottom:6px;
  }
  .summary-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;
    font-size:16.5px;color:var(--ink-blue);
  }
  .summary-grid .item{
    background:rgba(255,241,118,0.35);
    border-left:4px solid var(--marker-red2);
    padding:4px 8px;border-radius:3px;
  }
  .footer-note{
    text-align:center;color:#7a7360;font-size:14px;margin:18px 0 4px;
  }

  @media(max-width:600px){
    .page{padding:26px 16px 26px 46px;}
    .page::before{left:30px;}
    .page::after{display:none;}
    .cover h1{font-size:32px;}
    ul.exp-list, .exp-label, .ans-line, ul.options, .note-nomatch, .tip-box{padding-left:22px;margin-left:0;}
    .qnum{width:28px;height:28px;line-height:28px;font-size:14px;}
  }
</style>

/* ============================================================
   Helper functions
   ============================================================ */
function fmt(t){
  return t.replace(/\*\*(.*?)\*\*/g,'<span class="red-term">$1</span>')
          .replace(/==(.*?)==/g,'<span class="hl">$1</span>');
}
const letters=["A","B","C","D"];

function renderQuestion(item, idx){
  let optsHTML = item.options.map((o,i)=>{
    if(i===item.correct){
      return `<li class="correct">${letters[i]}) ${o}</li>`;
    }
    return `<li>${letters[i]}) ${o}</li>`;
  }).join("");

  let notematchHTML = item.notematch ? `<div class="note-nomatch">${item.notematch}</div>` : "";
  let ansHTML = item.correct>=0 ? `<div class="ans-line">✔ Answer &rarr; <span class="hl">Option ${letters[item.correct]}</span></div>` : "";

  let expHTML = item.exp.map(e=>`<li>${fmt(e)}</li>`).join("");

  let tipHTML="";
  if(item.tip){
    let cls = item.tip.type==="mistake" ? "mistake" : item.tip.type==="trick" ? "trick" : "";
    tipHTML = `<div class="tip-box ${cls}">${item.tip.text}</div>`;
  }

  let diagHTML="";
  if(item.diagram && diagrams[item.diagram]){
    diagHTML = `<div class="diagram-col">${diagrams[item.diagram]}</div>`;
  }

  return `
  <div class="qblock">
    <div class="flexwrap">
      <div class="qtext-col">
        <div class="qhead"><span class="qnum">${idx}</span>${fmt(item.q)}</div>
        <ul class="options">${optsHTML}</ul>
        ${notematchHTML}
        ${ansHTML}
        <div class="exp-label">📘 Explanation :</div>
        <ul class="exp-list">${expHTML}</ul>
        ${tipHTML}
      </div>
      ${diagHTML}
    </div>
  </div>`;
}

/* ============================================================
   PAGE BUILDING — group questions into notebook pages
   ============================================================ */
function chunk(arr,size){
  let out=[];
  for(let i=0;i<arr.length;i+=size) out.push(arr.slice(i,i+size));
  return out;
}

const doodleSet = ["★","✦","☆","➤","✎","♥","🔖","📌","✔","🧠"];
function randomDoodles(n){
  let html="";
  for(let i=0;i<n;i++){
    let d = doodleSet[Math.floor(Math.random()*doodleSet.length)];
    let top = 10 + Math.random()*85;
    let left = Math.random()<0.5 ? (2+Math.random()*4) : (92+Math.random()*5);
    let rot = (Math.random()*40-20).toFixed(1);
    let color = ["#d21f1f","#1c3fae","#5b2a86","#1f7a3d"][Math.floor(Math.random()*4)];
    html += `<span class="doodle" style="top:${top}%; left:${left}%; transform:rotate(${rot}deg); color:${color};">${d}</span>`;
  }
  return html;
}

let pageTiltClasses=["tilt1","tilt2","tilt3","tilt4"];
function buildPages(dataArr, startIndex, offsetForNum){
  const groups = chunk(dataArr, 3);
  let html="";
  groups.forEach((g, gi)=>{
    let tilt = pageTiltClasses[(startIndex+gi)%4];
    let inner = g.map((item,ii)=> renderQuestion(item, offsetForNum + gi*3 + ii + 1)).join("");
    html += `<div class="page ${tilt}">${randomDoodles(2)}<div class="torn"></div>${inner}</div>`;
  });
  return html;
}
